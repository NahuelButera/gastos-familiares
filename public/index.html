<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Mi Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --black:#0D0D0D;
  --black2:#161616;
  --black3:#1E1E1E;
  --white:#FFFFFF;
  --gray-bg:#F4F5F7;
  --gray-bg2:#ECEEF2;
  --border:#E8EAF0;
  --border-dark:rgba(255,255,255,0.08);
  --text-dark:#0D0D0D;
  --text-mid:#6B7280;
  --text-light:#9CA3AF;
  --blue:#2563EB;
  --blue-light:#EFF6FF;
  --green:#10B981;
  --green-light:#ECFDF5;
  --red:#EF4444;
  --red-light:#FEF2F2;
  --amber:#F59E0B;
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--gray-bg);color:var(--text-dark);font-family:'DM Sans',sans-serif;min-height:100vh;width:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:var(--gray-bg)}
button,input{font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fall{0%{top:-40px;opacity:1}80%{opacity:.8}100%{top:110%;opacity:0;transform:translateX(var(--drift,0)) rotate(var(--rot,0))}}
@keyframes pop{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}

.screen{min-height:100vh;padding-bottom:88px;animation:fadeUp 0.18s ease}
.tap{transition:transform 0.1s,opacity 0.1s}
.tap:active{transform:scale(0.95);opacity:0.75}

/* TOAST */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--black);color:#fff;
  padding:10px 22px;border-radius:100px;
  font-size:13px;font-weight:600;
  z-index:3000;white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,0.25);
  animation:fadeUp 0.18s ease;
}

/* BOTTOM NAV — white, like Cryptok */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--white);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:10px 8px calc(10px + env(safe-area-inset-bottom));
  z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  border:none;border-radius:12px;padding:8px 4px;
  font-size:10px;font-weight:600;color:var(--text-light);
  background:transparent;transition:all 0.18s;letter-spacing:0.1px;
}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{transition:all 0.18s}
.nav-btn.active svg{stroke:var(--blue)}

/* CENTER FAB — blue circle like Cryptok */
.nav-fab{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;
  background:var(--blue);
  border:none;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(37,99,235,0.4);
  margin:0 4px;position:relative;top:-14px;
  transition:all 0.15s;
}
.nav-fab:active{transform:scale(0.92) translateY(0)}

/* ═══ HEADER DARK SECTION ═══ */
.header-dark{
  background:var(--black);
  padding:52px 20px 28px;
  position:relative;
  overflow:hidden;
}
.header-dark::after{
  content:"";
  position:absolute;bottom:-1px;left:0;right:0;height:24px;
  background:var(--gray-bg);
  border-radius:24px 24px 0 0;
}

/* ═══ WHITE CARD ═══ */
.wcard{
  background:var(--white);
  border-radius:16px;
  border:1px solid var(--border);
  padding:16px;
}

/* TX ROW */
.tx-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tx-row:last-child{border-bottom:none;padding-bottom:0}
.tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:19px}

/* FIELD */
.field{
  width:100%;background:var(--gray-bg);
  border:1.5px solid var(--border);
  border-radius:12px;
  padding:13px 16px;font-size:14px;color:var(--text-dark);
  font-weight:500;transition:border-color 0.2s;
}
.field:focus{border-color:var(--blue);background:#fff;outline:none}
.field::placeholder{color:var(--text-light);font-weight:400}

/* BUTTONS */
.btn-blue{
  border:none;border-radius:100px;padding:15px;
  font-size:15px;font-weight:700;color:#fff;
  background:var(--blue);width:100%;
  box-shadow:0 6px 20px rgba(37,99,235,0.3);
  transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-blue:active{opacity:0.88;transform:scale(0.98)}
.btn-ghost{
  background:var(--gray-bg);border:1.5px solid var(--border);
  border-radius:100px;padding:13px 22px;
  font-size:14px;font-weight:600;color:var(--text-mid);transition:all 0.15s;
}
.btn-ghost:active{background:var(--gray-bg2)}

/* NUMPAD */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:0 auto;width:100%}
.numkey{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:14px;padding:17px 0;
  font-size:22px;font-weight:600;color:var(--text-dark);
  transition:all 0.1s;width:100%;
  font-family:'DM Mono',monospace;
}
.numkey:active{transform:scale(0.91);background:var(--blue-light);border-color:var(--blue);color:var(--blue)}
.numkey.confirm{background:var(--blue);color:#fff;border-color:var(--blue);font-size:20px;font-family:'DM Sans',sans-serif}
.numkey.del{background:var(--gray-bg);border-color:var(--border);color:var(--text-mid)}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cat-btn{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:14px;padding:16px 8px;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  transition:all 0.15s;cursor:pointer;
}
.cat-btn:active{transform:scale(0.95)}
.cat-btn.sel{border-color:var(--blue);background:var(--blue-light)}

/* STEPS */
.stepbar{height:3px;border-radius:100px;background:var(--border);flex:1;transition:all 0.3s}
.stepbar.on{background:var(--blue)}

/* BACK BTN */
.back-btn{
  width:36px;height:36px;border-radius:50%;
  border:1.5px solid var(--border);background:var(--white);
  color:var(--text-dark);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.15s;
}
.back-btn:active{background:var(--gray-bg2)}

/* PIN */
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all 0.15s}
.pin-dot.on{background:var(--blue);border-color:var(--blue);transform:scale(1.15)}
.pin-dot.err{background:var(--red);border-color:var(--red)}
.pin-key{
  background:var(--gray-bg);border:1.5px solid var(--border);
  border-radius:14px;padding:17px 0;
  font-size:20px;font-weight:600;color:var(--text-dark);
  cursor:pointer;transition:all 0.1s;width:100%;
  font-family:'DM Mono',monospace;
}
.pin-key:active{background:var(--blue-light);border-color:var(--blue);color:var(--blue);transform:scale(0.93)}
.pin-key.heart{background:var(--gray-bg);color:var(--blue)}
.pin-key.del{color:var(--text-mid)}

/* CHECK */
.chk{
  width:22px;height:22px;border-radius:50%;
  border:2px solid var(--border);background:none;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;flex-shrink:0;transition:all 0.15s;
}
.chk.done{background:var(--green);border-color:var(--green)}

/* PROGRESS */
.prog-track{height:4px;background:var(--gray-bg2);border-radius:100px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:100px;transition:width 0.5s ease}

/* SPINNER */
.spinner{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--blue);animation:spin 0.8s linear infinite;display:inline-block}

/* RAINDROP */
.raindrop{position:fixed;top:-40px;animation:fall linear forwards;pointer-events:none;z-index:9998}

/* ACTION CIRCLE */
.act-circle{
  width:50px;height:50px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:none;flex-shrink:0;transition:all 0.13s;
  background:rgba(255,255,255,0.1);
}
.act-circle:active{transform:scale(0.88)}

/* USER DOT */
.user-dot{
  border-radius:50%;border:none;
  font-weight:800;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;transition:all 0.18s;
  font-family:'DM Sans',sans-serif;
}

/* SECTION TITLE */
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:16px;font-weight:700;color:var(--text-dark)}
.sec-link{font-size:12px;font-weight:600;color:var(--blue);cursor:pointer}

/* STAT PILL */
.stat-pill{
  flex:1;background:var(--white);border-radius:12px;
  border:1px solid var(--border);padding:12px 14px;
}

/* MONO */
.mono{font-family:'DM Mono',monospace}
</style>
</head>
<body>
<div id="app"></div>
<div id="rain-layer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:9999"></div>
<div id="love-msg" style="position:fixed;bottom:110px;left:0;width:100%;text-align:center;font-size:14px;font-weight:700;color:#fff;background:rgba(0,0,0,0.7);opacity:0;transform:translateY(10px);transition:all 0.5s ease;pointer-events:none;z-index:10000;padding:10px 24px;border-radius:100px;max-width:320px;left:50%;transform:translateX(-50%) translateY(10px);margin:0 auto"></div>
<script>
/* ─────────────────────────────────────────────
   DATA / STATE
───────────────────────────────────────────── */
const DEFAULT_CATS=[
  {id:"mercaderia",label:"Mercado",icon:"🛒",color:"#2563EB",bg:"#EFF6FF"},
  {id:"servicios",label:"Servicios",icon:"⚡",color:"#F59E0B",bg:"#FFFBEB"},
  {id:"transporte",label:"Transporte",icon:"🚗",color:"#10B981",bg:"#ECFDF5"},
  {id:"salud",label:"Salud",icon:"💊",color:"#EF4444",bg:"#FEF2F2"},
  {id:"ocio",label:"Ocio",icon:"🎬",color:"#8B5CF6",bg:"#F5F3FF"},
  {id:"ropa",label:"Ropa",icon:"👕",color:"#EC4899",bg:"#FDF2F8"},
  {id:"otro",label:"Otro",icon:"📌",color:"#6B7280",bg:"#F9FAFB"},
];
const USERS=[
  {id:"N",name:"Nahuel",color:"#2563EB",bg:"#EFF6FF",grad:"linear-gradient(135deg,#3B82F6,#1D4ED8)"},
  {id:"F",name:"Florencia",color:"#8B5CF6",bg:"#F5F3FF",grad:"linear-gradient(135deg,#A78BFA,#7C3AED)"},
  {id:"V",name:"Vitto",color:"#F59E0B",bg:"#FFFBEB",grad:"linear-gradient(135deg,#FCD34D,#D97706)"},
];
const EMPTY={expenses:[],incomes:[],shopping:[],customCats:[]};
const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
const toStr=()=>new Date().toISOString().split("T")[0];
const sowStr=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split("T")[0];};
const getCats=()=>[...DEFAULT_CATS,...(S.data.customCats||[])];
const getCat=id=>getCats().find(x=>x.id===id)||DEFAULT_CATS[6];
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const PROXY_URL="/api/sync";

let S={
  screen:"loading",tab:"home",
  activeUser:localStorage.getItem("gf_user")||null,
  data:EMPTY,syncing:false,online:false,toast:null,
  loginPin:"",loginErr:false,
  amount:"",desc:"",cat:null,step:1,expUser:null,
  incAmt:"",incDesc:"",incStep:1,
  newCat:{name:"",color:"#2563EB",icon:"📌"},
};

let pollIv=null,writeT=null,toastT=null,writing=false;

function set(patch){S={...S,...patch};render();}
function showToast(msg){if(toastT)clearTimeout(toastT);set({toast:msg});toastT=setTimeout(()=>set({toast:null}),2400);}

async function gsRun(fn,param){
  if(fn==="saveData"){
    const r=await fetch(PROXY_URL,{method:"POST",body:JSON.stringify(param),headers:{"Content-Type":"application/json"}});
    return r.json();
  }
  const r=await fetch(PROXY_URL,{method:"GET"});
  return r.json();
}
async function load(){
  set({syncing:true});
  try{const d=await gsRun("getData");set({data:d||EMPTY,online:true,syncing:false,screen:"login"});}
  catch{set({online:false,syncing:false,screen:"login"});}
}
function scheduleWrite(data){
  if(writeT)clearTimeout(writeT);
  writing=true;
  writeT=setTimeout(async()=>{
    try{await gsRun("saveData",data);set({online:true});}
    catch{set({online:false});}
    finally{writing=false;}
  },800);
}
async function poll(){
  if(writing)return;
  try{const d=await gsRun("getData");if(d&&!writing){S.data=d;S.online=true;}}
  catch{S.online=false;}
}
function upd(fn){const next=fn(S.data);set({data:next});scheduleWrite(next);}
function calcUser(uid){
  const ex=(S.data.expenses||[]).filter(e=>e.user===uid);
  const inc=(S.data.incomes||[]).filter(i=>i.user===uid);
  const totI=inc.reduce((s,i)=>s+i.amount,0);
  const totE=ex.reduce((s,e)=>s+e.amount,0);
  const wkE=ex.filter(e=>e.date>=sowStr()).reduce((s,e)=>s+e.amount,0);
  return{totI,totE,bal:totI-totE,wkE,uExp:ex};
}

/* ─────────────────────────────────────────────
   LOVE RAIN
───────────────────────────────────────────── */
function loveRain(){
  const layer=document.getElementById("rain-layer");
  const msg=document.getElementById("love-msg");
  const msgs=["Los Amo mucho 🍂","Sos mi mundo, Flor 💛","Vitto, mi alegría 🌿","Familia, lo más lindo 🍁","Te amo, Florencia 🫒","Papá los ama 🌾"];
  if(msg){
    msg.textContent=msgs[Math.floor(Math.random()*msgs.length)];
    msg.style.opacity="1";msg.style.transform="translateX(-50%) translateY(0)";
    setTimeout(()=>{msg.style.opacity="0";msg.style.transform="translateX(-50%) translateY(10px)"},3000);
  }
  if(!layer)return;
  layer.innerHTML="";
  ["🍂","🍁","🌿","🫒","🌾","💙","⭐"].forEach((em,_)=>{
    for(let i=0;i<6;i++){
      setTimeout(()=>{
        const d=document.createElement("div");d.className="raindrop";d.textContent=em;
        const x=Math.random()*(window.innerWidth||400);const dur=1.3+Math.random()*1.8;
        d.style.left=x+"px";d.style.fontSize=(12+Math.random()*14)+"px";
        d.style.setProperty("--drift",(Math.random()-0.5)*60+"px");
        d.style.setProperty("--rot",(Math.random()-0.5)*360+"deg");
        d.style.animationDuration=dur+"s";
        layer.appendChild(d);setTimeout(()=>d.remove(),(dur*1000)+200);
      },(_*6+i)*60);
    }
  });
}

/* ─────────────────────────────────────────────
   H HELPER
───────────────────────────────────────────── */
const h=(tag,attr={},kids=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attr)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="id")el.id=v;
    else el.setAttribute(k,v);
  }
  for(const ch of kids){
    if(ch==null)continue;
    el.appendChild(typeof ch==="string"?document.createTextNode(ch):ch);
  }
  return el;
};

/* SVG icons */
function svg(path,size,color){
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("width",size);s.setAttribute("height",size);s.setAttribute("viewBox","0 0 24 24");
  s.setAttribute("fill","none");s.setAttribute("stroke",color||"currentColor");
  s.setAttribute("stroke-width","1.8");s.setAttribute("stroke-linecap","round");s.setAttribute("stroke-linejoin","round");
  s.innerHTML=path;return s;
}
const IC={
  home:'<path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/>',
  activity:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
  list:'<line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/>',
  dashboard:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  up:'<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>',
  down:'<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  wallet:'<rect x="1" y="4" width="22" height="16" rx="2"/><path d="M16 12h2"/>',
  bell:'<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>',
  search:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
};
function icon(name,size,color){
  const w=document.createElement("div");
  w.style.cssText=`display:flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;flex-shrink:0`;
  w.appendChild(svg(IC[name]||IC.plus,size,color||"currentColor"));
  return w;
}

/* ─────────────────────────────────────────────
   NUMPAD — local state, no full re-render
───────────────────────────────────────────── */
function mkNumpad(getVal,setVal,onConfirm,confirmColor){
  let localVal=getVal();

  /* display */
  const numEl=document.createElement("div");
  numEl.style.cssText="font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;font-family:'DM Mono',monospace;color:var(--text-dark);text-align:center;margin-bottom:8px;transition:color 0.15s";
  const symEl=document.createElement("div");
  symEl.style.cssText="font-size:16px;font-weight:600;color:var(--text-light);text-align:center;margin-bottom:4px;letter-spacing:0.5px;text-transform:uppercase";
  symEl.textContent="Monto en pesos";

  function refresh(){
    numEl.textContent=localVal||"0";
    numEl.style.color=localVal?"var(--text-dark)":"var(--border)";
  }
  refresh();

  const displayBox=document.createElement("div");
  displayBox.style.cssText="text-align:center;margin-bottom:28px;padding:20px;background:var(--white);border-radius:16px;border:1px solid var(--border)";
  const prefix=document.createElement("div");
  prefix.style.cssText="font-size:24px;font-weight:500;color:var(--text-light);margin-bottom:2px;font-family:'DM Mono',monospace";
  prefix.textContent="$";
  displayBox.appendChild(prefix);
  displayBox.appendChild(numEl);
  displayBox.appendChild(symEl);

  const grid=document.createElement("div");
  grid.className="numpad";
  ["1","2","3","4","5","6","7","8","9","⌫","0","✓"].forEach(k=>{
    const btn=document.createElement("button");
    btn.className="numkey tap"+(k==="✓"?" confirm":k==="⌫"?" del":"");
    btn.textContent=k;
    if(k==="✓"&&confirmColor){btn.style.background=confirmColor;btn.style.borderColor=confirmColor;btn.style.boxShadow=`0 6px 20px ${confirmColor}40`;}
    btn.addEventListener("click",()=>{
      if(k==="⌫"){localVal=localVal.slice(0,-1);}
      else if(k==="✓"){if(localVal){setVal(localVal);onConfirm();}}
      else{if(localVal.length<9)localVal+=k;}
      refresh();
    });
    grid.appendChild(btn);
  });

  const wrap=document.createElement("div");
  wrap.appendChild(displayBox);
  wrap.appendChild(grid);
  return wrap;
}

/* ─────────────────────────────────────────────
   SHARED COMPONENTS
───────────────────────────────────────────── */
function mkSteps(cur,tot){
  const row=h("div",{style:{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"22px"}});
  for(let i=0;i<tot;i++){
    row.appendChild(h("div",{className:"stepbar"+(cur>i?" on":""),style:{width:cur>i?"28px":"8px"}}));
  }
  return row;
}

function mkSubHeader(title,onBack){
  return h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"52px 20px 16px"}},[
    h("button",{className:"back-btn tap",onClick:onBack},["←"]),

/* ─────────────────────────────────────────────
   BOTTOM NAV
───────────────────────────────────────────── */
function mkBottomNav(activeTab,onChange){
  const left=[{id:"home",ic:"home",label:"Inicio"},{id:"activity",ic:"activity",label:"Movimientos"}];
  const right=[{id:"shopping",ic:"list",label:"Lista"},{id:"dashboard",ic:"dashboard",label:"Análisis"}];

  function nb(item){
    const active=activeTab===item.id;
    const btn=h("button",{className:"nav-btn"+(active?" active":"")+" tap",onClick:()=>onChange(item.id)});
    btn.appendChild(svg(IC[item.ic],22,active?"#2563EB":"#9CA3AF"));
    btn.appendChild(document.createTextNode(item.label));
    return btn;
  }

  const unread=(S.data.shopping||[]).filter(s=>!s.checked).length;
  const shopBtn=h("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}});
  const shopInner=h("button",{className:"nav-btn"+(activeTab==="shopping"?" active":"")+" tap",style:{width:"100%"},onClick:()=>onChange("shopping")});
  shopInner.appendChild(svg(IC.list,22,activeTab==="shopping"?"#2563EB":"#9CA3AF"));
  shopInner.appendChild(document.createTextNode("Lista"));
  shopBtn.appendChild(shopInner);
  if(unread>0){
    shopBtn.appendChild(h("div",{style:{
      position:"absolute",top:"6px",right:"12px",
      width:"16px",height:"16px",borderRadius:"50%",
      background:"#EF4444",color:"#fff",fontSize:"9px",fontWeight:"700",
      display:"flex",alignItems:"center",justifyContent:"center",
      border:"2px solid #fff",
    }},[unread]));
  }

  return h("div",{className:"bottom-nav"},[
    nb(left[0]),
    nb(left[1]),
    h("button",{className:"nav-fab tap",onClick:()=>set({step:1,screen:"add"})},[ svg(IC.plus,24,"#fff") ]),
    shopBtn,
    nb(right[1]),
  ]);
}

/* ─────────────────────────────────────────────

───────────────────────────────────────────── */
function sShopping(){
  const shopping=S.data.shopping||[];

  const done=shopping.filter(i=>i.checked);

  const inp=h("input",{className:"field",placeholder:"Agregar ítem a la lista..."});
  const addItem=()=>{
    const t=inp.value.trim();if(!t)return;
    upd(d=>({...d,shopping:[{id:genId(),text:t,checked:false,from:"manual"},...(d.shopping||[])]}));
    inp.value="";
  };
  inp.addEventListener("keydown",e=>e.key==="Enter"&&addItem());

  function mkItem(item,isLast){
    return h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 0",borderBottom:isLast?"none":"1px solid var(--border)"}},[
      h("button",{className:"chk tap"+(item.checked?" done":""),

    h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
      h("div",{style:{padding:"52px 20px 0"}},[

        return h("div",{className:"wcard",style:{marginBottom:"10px"}},[
          h("div",{style:{display:"flex",alignItems:"center",gap:"12px",marginBottom:"12px"}},[
            h("div",{style:{width:"40px",height:"40px",borderRadius:"12px",background:u.grad,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"15px",color:"#fff",flexShrink:0}},[u.id]),
            h("div",{style:{flex:1}},[
              h("div",{style:{fontSize:"14px",fontWeight:"700",color:"var(--text-dark)"}},[u.name]),
              h("div",{style:{fontSize:"11px",color:"var(--text-light)",marginTop:"1px"}},["esta semana: "+fmt(cv.wkE)]),
            ]),
            h("div",{className:"mono",style:{fontSize:"15px",fontWeight:"800",color:cv.bal>=0?"var(--text-dark)":"var(--red)",letterSpacing:"-0.5px"}},[fmt(cv.bal)]),
          ]),
          h("div",{style:{display:"flex",gap:"20px"}},[
            h("div",{},[h("div",{style:{fontSize:"10px",color:"var(--text-light)",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"2px"}},["Ingresos"]),h("div",{className:"mono",style:{fontSize:"14px",fontWeight:"700",color:"var(--green)"}},[fmt(cv.totI)])]),
            h("div",{},[h("div",{style:{fontSize:"10px",color:"var(--text-light)",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"2px"}},["Gastos"]),h("div",{className:"mono",style:{fontSize:"14px",fontWeight:"700",color:"var(--red)"}},[fmt(cv.totE)])]),
          ]),
          h("div",{className:"prog-track"},[
            h("div",{className:"prog-fill",style:{width:pct+"%",background:u.grad}}),
          ]),
        ]);
      }),

      /* Categories */
      h("div",{style:{fontSize:"12px",fontWeight:"700",color:"var(--text-light)",textTransform:"uppercase",letterSpacing:"0.8px",margin:"6px 0 10px"}},["Por categoría"]),
      h("div",{className:"wcard",style:{padding:"0 16px",marginBottom:"14px"}},[
        ...getCats().map((ct,i,arr)=>{
          const total=allExp.filter(e=>e.category===ct.id).reduce((s,e)=>s+e.amount,0);
          if(total===0)return null;
          const isLast=i===arr.length-1;
          return h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"12px 0",borderBottom:isLast?"none":"1px solid var(--border)"}},[
            h("div",{className:"tx-icon",style:{background:ct.bg,width:"36px",height:"36px",borderRadius:"10px"}},[h("span",{style:{fontSize:"17px"}},[ct.icon])]),
            h("div",{style:{flex:1,fontSize:"13px",fontWeight:"600",color:"var(--text-dark)"}},[ct.label]),
            h("div",{className:"mono",style:{fontSize:"13px",fontWeight:"700",color:"var(--text-dark)"}},[fmt(total)]),
          ]);
        }).filter(Boolean),
        ...(allExp.length===0?[h("div",{style:{padding:"24px 0",textAlign:"center",fontSize:"13px",color:"var(--text-light)",fontWeight:"500"}},["Sin datos aún"])]:[ ]),
      ]),

      /* Danger zone */
      h("div",{style:{display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"16px"}},[
        h("button",{className:"tap",style:{
          width:"100%",background:"#FEF2F2",border:"1px solid #FECACA",
          color:"var(--red)",borderRadius:"12px",padding:"14px",fontSize:"13px",fontWeight:"700",
        },onClick:()=>{if(confirm("¿Borrar todos los datos?"))upd(()=>EMPTY);}},["🗑  Borrar todos los datos"]),
        h("button",{className:"tap",style:{
          width:"100%",background:"var(--gray-bg2)",border:"1px solid var(--border)",
          color:"var(--text-mid)",borderRadius:"12px",padding:"14px",fontSize:"13px",fontWeight:"600",
        },onClick:()=>{localStorage.removeItem("gf_user");set({activeUser:null,loginPin:"",loginErr:false,screen:"login"});}},["Cambiar usuario"]),
      ]),
    ]),
  ]);
}

/* ─────────────────────────────────────────────
   SCREEN: ADD EXPENSE
   step 1 = amount (local state, no re-render flicker)
   step 2 = category
   step 3 = confirm + description
───────────────────────────────────────────── */
function sAdd(){
  const user=USERS.find(u=>u.id===S.activeUser)||USERS[0];
  const tUser=USERS.find(u=>u.id===S.expUser)||user;

  if(S.step===1){
    let localAmt=S.amount;

    const wrap=h("div",{className:"screen",style:{background:"var(--white)"}});
    wrap.appendChild(h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
      mkSubHeader(`Gasto · ${tUser.name}`,()=>set({step:1,expUser:null,screen:"main",tab:"home"})),
      h("div",{style:{background:"var(--white)",height:"24px",borderRadius:"24px 24px 0 0"}}),
    ]));

    const body=h("div",{style:{padding:"8px 20px"}});
    body.appendChild(mkSteps(1,3));
    body.appendChild(mkNumpad(
      ()=>localAmt,
      v=>{localAmt=v;},
      ()=>{set({amount:localAmt,step:2});},
      tUser.color
    ));
    wrap.appendChild(body);
    return wrap;
  }

  if(S.step===2){
    return h("div",{className:"screen",style:{background:"var(--white)"}}, [
      h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
        mkSubHeader("Categoría",()=>set({step:1})),
        h("div",{style:{background:"var(--white)",height:"24px",borderRadius:"24px 24px 0 0"}}),
      ]),
      h("div",{style:{padding:"8px 20px"}},[
        mkSteps(2,3),
        h("div",{style:{textAlign:"center",marginBottom:"20px"}},[
          h("div",{className:"mono",style:{fontSize:"32px",fontWeight:"800",color:"var(--text-dark)",letterSpacing:"-1px"}},[fmt(parseFloat(S.amount)||0)]),
          h("div",{style:{fontSize:"12px",color:"var(--text-light)",marginTop:"4px",fontWeight:"500"}},["Seleccioná la categoría"]),
        ]),
        h("div",{className:"cat-grid"},[
          ...getCats().map(ct=>{
            const sel=S.cat===ct.id;
            return h("button",{className:"cat-btn tap"+(sel?" sel":""),onClick:()=>set({cat:ct.id,step:3})},[
              h("span",{style:{fontSize:"26px"}},[ct.icon]),
              h("span",{style:{fontSize:"11px",fontWeight:"600",color:sel?"var(--blue)":ct.color}},[ct.label]),
            ]);
          }),
          h("button",{className:"cat-btn tap",style:{borderStyle:"dashed"},onClick:()=>set({screen:"newcat"})},[
            h("span",{style:{fontSize:"26px",color:"var(--text-light)"}},[" +"]),
            h("span",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text-light)"}},["Nueva"]),
          ]),
        ]),
      ]),
    ]);
  }

  /* Step 3 — confirm */
  const ctObj=getCat(S.cat);
  const descInp=h("input",{className:"field",placeholder:"Descripción (opcional)",maxlength:"50",style:{textAlign:"center",marginBottom:"16px"}});
  descInp.value=S.desc;
  descInp.addEventListener("input",e=>{S.desc=e.target.value;});

  return h("div",{className:"screen",style:{background:"var(--white)"}},[
    h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
      mkSubHeader("Confirmar",()=>set({step:2})),
      h("div",{style:{background:"var(--white)",height:"24px",borderRadius:"24px 24px 0 0"}}),
    ]),
    h("div",{style:{padding:"8px 20px"}},[
      mkSteps(3,3),
      h("div",{style:{textAlign:"center",marginBottom:"24px"}},[
        h("div",{style:{
          width:"72px",height:"72px",borderRadius:"20px",
          background:ctObj.bg,display:"flex",alignItems:"center",justifyContent:"center",
          margin:"0 auto 16px",fontSize:"30px",border:`1px solid ${ctObj.color}20`,
        }},[ctObj.icon]),
        h("div",{className:"mono",style:{fontSize:"38px",fontWeight:"800",color:"var(--text-dark)",letterSpacing:"-1.5px",marginBottom:"6px"}},[fmt(parseFloat(S.amount))]),
        h("div",{style:{fontSize:"13px",fontWeight:"600",color:ctObj.color,marginBottom:"3px"}},[ctObj.label]),
        h("div",{style:{fontSize:"12px",color:"var(--text-light)"}},[`→ ${tUser.name}`]),
      ]),
      descInp,
      h("div",{style:{display:"flex",gap:"10px"}},[
        h("button",{className:"btn-ghost tap",onClick:()=>set({step:2})},["← Atrás"]),
        h("button",{className:"btn-blue tap",style:{background:tUser.color,boxShadow:`0 6px 20px ${tUser.color}40`},onClick:()=>{
          const amt=parseFloat(S.amount);
          if(!amt||!S.cat)return;
          const exp={id:genId(),amount:amt,description:S.desc,category:S.cat,user:S.expUser||S.activeUser,date:toStr()};
          upd(d=>({...d,
            expenses:[exp,...(d.expenses||[])],
            shopping:(S.cat==="mercaderia"&&S.desc.trim())
              ?[{id:genId(),text:S.desc.trim(),checked:false},...(d.shopping||[])]
              :(d.shopping||[]),
          }));
          set({amount:"",desc:"",cat:null,step:1,expUser:null,screen:"main",tab:"home"});
          showToast("✓ Gasto registrado");
        }},["Guardar"]),
      ]),
    ]),
  ]);
}

/* ─────────────────────────────────────────────
   SCREEN: INCOME
───────────────────────────────────────────── */
function sIncome(){
  const user=USERS.find(u=>u.id===S.activeUser)||USERS[0];

  if(S.incStep===1){
    let localAmt=S.incAmt;
    const wrap=h("div",{className:"screen",style:{background:"var(--white)"}});
    wrap.appendChild(h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
      mkSubHeader("Nuevo Ingreso",()=>set({incStep:1,screen:"main",tab:"home"})),
      h("div",{style:{background:"var(--white)",height:"24px",borderRadius:"24px 24px 0 0"}}),
    ]));
    const body=h("div",{style:{padding:"8px 20px"}});
    body.appendChild(mkSteps(1,2));
    body.appendChild(mkNumpad(
      ()=>localAmt,
      v=>{localAmt=v;},
      ()=>{set({incAmt:localAmt,incStep:2});},
      "#10B981"
    ));
    wrap.appendChild(body);
    return wrap;
  }

  const descInp=h("input",{className:"field",placeholder:"Ej: Sueldo enero",maxlength:"50",style:{textAlign:"center",marginBottom:"16px"}});
  descInp.value=S.incDesc;
  descInp.addEventListener("input",e=>{S.incDesc=e.target.value;});

  return h("div",{className:"screen",style:{background:"var(--white)"}},[
    h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
      mkSubHeader("Nuevo Ingreso",()=>set({incStep:1})),
      h("div",{style:{background:"var(--white)",height:"24px",borderRadius:"24px 24px 0 0"}}),
    ]),
    h("div",{style:{padding:"8px 20px"}},[
      mkSteps(2,2),
      h("div",{style:{textAlign:"center",marginBottom:"24px"}},[
        h("div",{style:{width:"72px",height:"72px",borderRadius:"20px",background:"#ECFDF5",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:"30px"}},[" 💵"]),
        h("div",{className:"mono",style:{fontSize:"38px",fontWeight:"800",color:"var(--green)",letterSpacing:"-1.5px",marginBottom:"6px"}},[fmt(parseFloat(S.incAmt))]),
        h("div",{style:{fontSize:"12px",color:"var(--text-light)"}},[`→ ${user.name}`]),
      ]),
      descInp,
      h("div",{style:{display:"flex",gap:"10px"}},[
        h("button",{className:"btn-ghost tap",onClick:()=>set({incStep:1})},["← Atrás"]),
        h("button",{className:"btn-blue tap",style:{background:"#10B981",boxShadow:"0 6px 20px rgba(16,185,129,0.35)"},onClick:()=>{
          const amt=parseFloat(S.incAmt);
          if(!amt)return;
          const inc={id:genId(),amount:amt,description:S.incDesc||"Ingreso",user:S.activeUser,date:toStr()};
          upd(d=>({...d,incomes:[inc,...(d.incomes||[])]}));
          set({incAmt:"",incDesc:"",incStep:1,screen:"main",tab:"home"});
          showToast("✓ Ingreso registrado");
        }},["Guardar Ingreso"]),
      ]),
    ]),
  ]);
}

/* ─────────────────────────────────────────────
   SCREEN: NEW CATEGORY
───────────────────────────────────────────── */
function sNewCat(){
  const nc=S.newCat||{name:"",color:"#2563EB",icon:"📌"};
  const COLORS=["#2563EB","#8B5CF6","#10B981","#EF4444","#F59E0B","#EC4899","#6B7280","#0EA5E9"];
  const ICONS=["🛒","⚡","🚗","💊","🎬","👕","📌","🏠","✈️","🐾","🎓","💪","🍕","☕","🛠️","🎮","🎵","📚","🏋️","🌿"];

  return h("div",{className:"screen",style:{background:"var(--white)"}},[
    h("div",{style:{background:"var(--black)",paddingBottom:"24px",position:"relative"}},[
      mkSubHeader("Nueva Categoría",()=>set({screen:"add",step:2})),
      h("div",{style:{background:"var(--white)",height:"24px",borderRadius:"24px 24px 0 0"}}),
    ]),
    h("div",{style:{padding:"8px 20px"}},[
      /* Preview */
      h("div",{className:"wcard",style:{display:"flex",alignItems:"center",gap:"14px",marginBottom:"20px"}},[
        h("div",{style:{width:"52px",height:"52px",borderRadius:"14px",background:nc.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"24px",border:`1.5px solid ${nc.color}30`}},[nc.icon]),
        h("div",{},[
          h("div",{style:{fontSize:"16px",fontWeight:"700",color:"var(--text-dark)"}},[nc.name||"Nombre..."]),
          h("div",{style:{fontSize:"11px",color:"var(--text-light)",marginTop:"2px"}},["Vista previa"]),
        ]),
      ]),
      /* Name */
      h("div",{style:{marginBottom:"20px"}},[
        h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--text-light)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}},["Nombre"]),
        (()=>{const i=h("input",{className:"field",placeholder:"Ej: Mascota, Gym...",maxlength:"20"});i.value=nc.name;i.addEventListener("input",e=>set({newCat:{...nc,name:e.target.value}}));return i;})(),
      ]),
      /* Color */
      h("div",{style:{marginBottom:"20px"}},[
        h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--text-light)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"10px"}},["Color"]),
        h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap"}},[
          ...COLORS.map(col=>h("button",{className:"tap",style:{
            width:"36px",height:"36px",borderRadius:"50%",background:col,border:"none",
            boxShadow:nc.color===col?`0 0 0 3px var(--white),0 0 0 5px ${col}`:"none",
            transition:"all 0.15s",
          },onClick:()=>set({newCat:{...nc,color:col}})})),
        ]),
      ]),
      /* Icons */
      h("div",{style:{marginBottom:"28px"}},[
        h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--text-light)",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"10px"}},["Ícono"]),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px"}},[
          ...ICONS.map(ic=>h("button",{className:"tap",style:{
            padding:"12px 0",borderRadius:"12px",fontSize:"20px",
            background:nc.icon===ic?nc.color+"15":"var(--gray-bg)",
            border:`1.5px solid ${nc.icon===ic?nc.color:"var(--border)"}`,
            display:"flex",alignItems:"center",justifyContent:"center",
          },onClick:()=>set({newCat:{...nc,icon:ic}})},[ic])),
        ]),
      ]),
      h("button",{className:"btn-blue tap",style:{
        background:nc.name.trim()?nc.color:"var(--border)",
        boxShadow:nc.name.trim()?`0 6px 20px ${nc.color}40`:"none",
      },onClick:()=>{
        if(!nc.name.trim())return;
        const entry={id:"custom-"+genId(),label:nc.name.trim(),icon:nc.icon,color:nc.color,bg:nc.color+"15"};
        const nextData={...S.data,customCats:[...(S.data.customCats||[]),entry]};
        scheduleWrite(nextData);
        set({data:nextData,screen:"add",step:2,cat:entry.id,newCat:{name:"",color:"#2563EB",icon:"📌"}});
        showToast("✓ Categoría creada");
      }},["Guardar categoría"]),
    ]),
  ]);
}

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(S.toast)app.appendChild(h("div",{className:"toast"},[S.toast]));
  const screens={loading:sLoading,login:sLogin,main:sMain,add:sAdd,income:sIncome,newcat:sNewCat};
  app.appendChild((screens[S.screen]||sLoading)());
}

render();
load().then(()=>{
  if(pollIv)clearInterval(pollIv);
  pollIv=setInterval(poll,8000);
});
</script>
</body>
</html>
