<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#F5F6FA"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Wallet"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Mi Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --bg:      #F4F0E8;
    --bg2:     #EBE5D8;
    --white:   #FFFEFB;
    --border:  #DDD4C0;
    --border2: #C8BDA8;
    --text:    #2A1E14;
    --text2:   #7A6448;
    --text3:   #B0A088;
    --sage:    #5A8A70;
    --sage2:   #4A7860;
    --sage-l:  #EAF2EC;
    --sage-m:  #C0D8C8;
    --salmon:  #E8907A;
    --salmon2: #D07860;
    --salmon-l:#FAEEEA;
    --burg:    #7A2038;
    --burg-l:  #F5E8EC;
    --red:     #D04040;
    --amber:   #C8A040;
    --amber-l: #F8F0DC;
    --teal:    #6AAFA0;
    --teal2:   #5A9890;
    --teal-l:  #EAF5F2;
    --sh:  0 2px 12px rgba(42,30,20,0.07);
    --shm: 0 6px 20px rgba(42,30,20,0.10);
    --shl: 0 12px 36px rgba(42,30,20,0.13);
    --r:   18px;
    --rsm: 13px;
    --rxs: 9px;
    --rf:  999px;
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
  #app { max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg); }
  button, input, textarea { font-family:'DM Sans',sans-serif; cursor:pointer; outline:none; -webkit-appearance:none; }
  img { display:block; }

  @keyframes up   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  @keyframes in   { from{opacity:0} to{opacity:1} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes fall { 0%{top:-40px;opacity:1} 80%{opacity:.85} 100%{top:110%;opacity:0;transform:translateX(var(--drift,0px)) rotate(var(--rot,0deg))} }
  @keyframes msg  { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

  .screen { min-height:100vh; padding-bottom:108px; overflow-y:auto; background:var(--bg); animation:up .22s ease; }
  /* No animation on subsequent renders */
  .screen.no-anim { animation:none; }
  .tap { transition:transform .1s, opacity .1s; }
  .tap:active { transform:scale(.96); opacity:.82; }

  .toast { position:fixed; top:22px; left:50%; transform:translateX(-50%); background:var(--text); color:var(--white); padding:10px 22px; border-radius:var(--rf); font-size:13px; font-weight:600; z-index:3000; box-shadow:var(--shl); animation:up .2s ease; white-space:nowrap; }

  .bottom-nav {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:430px;
    background:var(--white);
    border-top:1px solid var(--border);
    display:flex; align-items:stretch;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index:100;
    box-shadow: 0 -4px 20px rgba(42,30,20,0.06);
    gap:0;
  }
  .nb { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:7px 4px; border:none; border-radius:12px; font-size:10px; font-weight:600; color:var(--text3); background:transparent; transition:all .18s; letter-spacing:.2px; }
  .nb.on { color:var(--sage); background:var(--sage-l); }
  .nb svg { display:block; }

  .nb-fab {
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg, var(--sage), var(--sage2));
    border:none; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 18px rgba(90,138,112,.45);
    flex-shrink:0; align-self:flex-end;
    position:relative; top:-12px;
    transition:all .15s; margin:0 6px;
  }
  .nb-fab:active { transform:scale(.9); }

  .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--border2); transition:background .4s; display:inline-block; }
  .spinner   { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--sage); animation:spin .8s linear infinite; }

  .wcard {
    border-radius:22px; padding:24px 22px 22px;
    background:linear-gradient(135deg, #6A9A80 0%, #3A6850 100%);
    color:#fff; position:relative; overflow:hidden;
    box-shadow:0 14px 40px rgba(58,104,80,.38);
  }
  .wcard::before { content:""; position:absolute; top:-60px; right:-60px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.07); pointer-events:none; }
  .wcard::after  { content:""; position:absolute; bottom:-70px; left:-30px; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.04); pointer-events:none; }

  .scard { background:var(--white); border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--sh); }

  .sec { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .sec-t { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-.2px; }
  .sec-a { font-size:12px; font-weight:600; color:var(--sage); cursor:pointer; }

  .txr { display:flex; align-items:center; gap:13px; padding:13px 0; border-bottom:1px solid var(--border); }
  .txr:last-child { border-bottom:none; padding-bottom:0; }
  .txav { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
  .txn  { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .txs  { font-size:11px; color:var(--text3); margin-top:2px; }
  .txa  { font-size:13px; font-weight:700; color:var(--burg); }
  .txa.inc { color:var(--sage); }

  .field { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--rsm); padding:14px 16px; font-size:14px; color:var(--text); font-weight:500; transition:all .2s; }
  .field:focus { border-color:var(--sage); background:var(--white); box-shadow:0 0 0 3px rgba(90,138,112,.12); }
  .field::placeholder { color:var(--text3); font-weight:400; }

  .btn { border:none; border-radius:var(--rf); padding:16px; font-size:15px; font-weight:700; color:#fff; background:linear-gradient(135deg, var(--sage), var(--sage2)); width:100%; box-shadow:0 6px 18px rgba(90,138,112,.32); transition:all .15s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn:active { transform:scale(.98); opacity:.9; }
  .btn-out { background:var(--white); border:1.5px solid var(--border); border-radius:var(--rf); padding:14px 22px; font-size:14px; font-weight:600; color:var(--text2); transition:all .15s; }
  .btn-out:active { background:var(--bg2); }

  .np { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:320px; margin:0 auto; width:100%; }
  .nk, .numkey { background:var(--white); border:1.5px solid var(--border); border-radius:var(--r); padding:16px 0; font-size:22px; font-weight:600; color:var(--text); box-shadow:var(--sh); transition:all .1s; width:100%; }
  .nk:active, .numkey:active { transform:scale(.91); background:var(--sage-l); border-color:var(--sage-m); }
  .nk.sp  { background:var(--sage-l); color:var(--sage); border-color:var(--sage-m); font-size:18px; }
  .nk.del { background:transparent; border:none; box-shadow:none; color:var(--text3); font-size:18px; opacity:.7; }

  .cgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .cbtn { background:var(--white); border:1.5px solid var(--border); border-radius:var(--r); padding:16px 8px; display:flex; flex-direction:column; align-items:center; gap:8px; box-shadow:var(--sh); cursor:pointer; transition:all .15s; }
  .cbtn:active { transform:translateY(-2px); }
  .cbtn.sel { border-color:var(--sage); background:var(--sage-l); box-shadow:0 4px 14px rgba(90,138,112,.2); }

  .sbar { height:3px; border-radius:var(--rf); background:var(--border); flex:1; transition:all .3s; }
  .sbar.on { background:linear-gradient(90deg, var(--sage), var(--sage2)); }

  .abig { font-size:54px; font-weight:800; letter-spacing:-2px; line-height:1; }
  .acfm { font-size:40px; font-weight:800; letter-spacing:-2px; line-height:1; }

  .bk { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border); background:var(--white); color:var(--text); font-size:18px; display:flex; align-items:center; justify-content:center; box-shadow:var(--sh); flex-shrink:0; }

  .subh { padding:52px 20px 16px; display:flex; align-items:center; gap:12px; background:var(--bg); }

  .udot { border-radius:50%; border:none; font-weight:800; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; cursor:pointer; transition:all .2s; }
  .udot img { width:100%; height:100%; object-fit:cover; }

  .chk { width:22px; height:22px; border-radius:50%; border:2px solid var(--border2); background:none; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; transition:all .15s; }
  .chk.done { background:var(--sage); border-color:var(--sage); }

  .pd { width:14px; height:14px; border-radius:50%; border:2px solid var(--border2); background:transparent; transition:all .18s; }
  .pd.on  { background:var(--sage); border-color:var(--sage); transform:scale(1.2); box-shadow:0 3px 10px rgba(90,138,112,.4); }
  .pd.err { background:var(--burg); border-color:var(--burg); }
  .pk { background:var(--white); border:1.5px solid var(--border); border-radius:var(--r); padding:16px 0; font-size:20px; font-weight:600; color:var(--text); cursor:pointer; transition:all .1s; width:100%; }
  .pk:active { background:var(--sage-l); border-color:var(--sage-m); transform:scale(.92); }
  .pk.hrt { background:var(--sage-l); color:var(--sage); border-color:var(--sage-m); }
  .pk.del { background:transparent; border:none; color:var(--text3); font-size:18px; opacity:.6; }

  .chat-wrap { display:flex; flex-direction:column; height:100vh; background:var(--bg); }
  .chat-msgs { flex:1; overflow-y:auto; padding:80px 16px 80px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:82%; padding:12px 16px; border-radius:20px; font-size:14px; line-height:1.5; animation:msg .2s ease; font-weight:500; }
  .msg.u { background:linear-gradient(135deg,var(--sage),var(--sage2)); color:#fff; align-self:flex-end; border-bottom-right-radius:5px; }
  .msg.b { background:var(--white); color:var(--text); align-self:flex-start; border-bottom-left-radius:5px; box-shadow:var(--sh); border:1px solid var(--border); }
  .msg.b.ld { opacity:.5; }
  .chat-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:var(--white); border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; z-index:50; }
  .cf { flex:1; background:var(--bg); border:1.5px solid var(--border); border-radius:var(--rf); padding:11px 18px; font-size:14px; color:var(--text); resize:none; max-height:80px; line-height:1.4; font-family:'DM Sans',sans-serif; }
  .cf:focus { border-color:var(--sage); outline:none; }
  .cs { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,var(--sage),var(--sage2)); border:none; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 12px rgba(90,138,112,.38); flex-shrink:0; }
  .cs:active { transform:scale(.9); }
  .txc  { background:var(--sage-l); border:1.5px solid var(--sage-m); border-radius:var(--r); padding:10px 12px; margin-top:6px; }
  .txcr { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .txcr:last-child { margin-bottom:0; }

  .lwrap { min-height:100vh; display:flex; flex-direction:column; background:var(--white); }

  .modal-bg { position:fixed; inset:0; background:rgba(42,30,20,.45); z-index:500; display:flex; align-items:flex-end; justify-content:center; animation:in .15s ease; }
  .modal    { background:var(--white); border-radius:28px 28px 0 0; padding:24px 24px 40px; width:100%; max-width:430px; animation:up .2s ease; }
  .modal-handle { width:36px; height:4px; border-radius:var(--rf); background:var(--border2); margin:0 auto 20px; }

  .drop { position:fixed; top:-40px; animation:fall linear forwards; pointer-events:none; z-index:9998; }
  #rl   { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:9999; }
  #lmsg { position:fixed; bottom:110px; left:0; width:100%; text-align:center; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; color:var(--sage); opacity:0; transform:translateY(10px); transition:all .5s ease; pointer-events:none; z-index:10000; padding:0 24px; line-height:1.5; }
  #lmsg.show { opacity:1!important; transform:none!important; }

  .stat-row { display:flex; gap:10px; margin-bottom:14px; }
  .stat-card { background:var(--white); border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--sh); padding:16px; flex:1; }
  .prog { height:6px; background:var(--bg2); border-radius:var(--rf); overflow:hidden; margin-top:8px; }
  .prog-fill { height:100%; border-radius:var(--rf); transition:width .5s ease; }

  /* Activity / shopping rows */
  .white-card { background:var(--white); border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--sh); padding:16px; }
  .tx-row { display:flex; align-items:center; gap:13px; padding:13px 0; }
  .label-dark { font-size:10px; font-weight:700; color:var(--text3); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; }
  .section-sub { font-size:12px; color:var(--text3); margin-top:4px; font-weight:500; }
  .check { width:22px; height:22px; border-radius:50%; border:2px solid var(--border2); background:none; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; transition:all .15s; }
  .check.done { background:var(--sage); border-color:var(--sage); }
  .auto-tag { font-size:9px; font-weight:700; color:var(--sage); background:var(--sage-l); border-radius:4px; padding:2px 5px; }
  .bar-track { flex:1; height:4px; background:var(--bg2); border-radius:99px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:99px; transition:width .5s; }
</style>
</head>
<body>
<div id="app"></div>
<div id="rl"></div>
<div id="lmsg"></div>
<script>
// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const DEFAULT_CATS=[
  {id:"mercaderia",label:"Mercado",icon:"cat-mercado",color:"#5A8A70",bg:"#EAF2EC"},
  {id:"servicios",label:"Servicios",icon:"cat-servicios",color:"#C8A040",bg:"#F8F0DC"},
  {id:"transporte",label:"Transporte",icon:"cat-transporte",color:"#7A6448",bg:"#F0EAE0"},
  {id:"salud",label:"Salud",icon:"cat-salud",color:"#E8907A",bg:"#FAEEEA"},
  {id:"ocio",label:"Ocio",icon:"cat-ocio",color:"#6AAFA0",bg:"#EAF5F2"},
  {id:"ropa",label:"Ropa",icon:"cat-ropa",color:"#7A2038",bg:"#F5E8EC"},
  {id:"otro",label:"Otro",icon:"cat-otro",color:"#B0A088",bg:"#F4F0E8"},
];

const USERS=[
  {id:"N",name:"Nahuel",color:"#5A8A70",grad:"linear-gradient(135deg,#6A9A80,#4A7860)"},
  {id:"F",name:"Florencia",color:"#E8907A",grad:"linear-gradient(135deg,#F0A08A,#D07860)"},
  {id:"V",name:"Vitto",color:"#C8A040",grad:"linear-gradient(135deg,#D8B040,#B89030)"},
];

const EMPTY={expenses:[],incomes:[],shopping:[],customCats:[],photos:{}};
const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
const toStr=()=>new Date().toISOString().split("T")[0];
const sowStr=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split("T")[0];};
const getCat=id=>getCats().find(c=>c.id===id)||DEFAULT_CATS[DEFAULT_CATS.length-1];
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const PROXY_URL="/api/sync";

// ─────────────────────────────────────────────
// STATE — single mutable object, never replaced wholesale
// ─────────────────────────────────────────────
const S={
  screen:"login", tab:"home",
  activeUser: localStorage.getItem("gf_user")||"N",
  data:{...EMPTY},
  syncing:false, online:false, toast:null,
  loginPin:"", loginErr:false,
  expUser:null, step:1, amount:"", desc:"", cat:null,
  incStep:1, incAmt:"", incDesc:"",
  chatMsgs:[], chatInput:"", chatLoading:false,
  showBt:false, btScanning:false, btStatus:"",
  newCat:{name:"",color:"#5A8A70",icon:"cat-otro"},
};

// ─────────────────────────────────────────────
// RENDER CONTROL — batched, no-flicker
// ─────────────────────────────────────────────
let _rafPending=false;
let _lastScreen="";
let _lastTab="";

function set(patch){
  Object.assign(S, patch);
  scheduleRender();
}

function scheduleRender(){
  if(_rafPending) return;
  _rafPending=true;
  requestAnimationFrame(()=>{
    _rafPending=false;
    render();
  });
}

// ─────────────────────────────────────────────
// LOCAL STORAGE
// ─────────────────────────────────────────────
const LS_KEY="mw_data_v2";
function lsLoad(){
  try{const d=localStorage.getItem(LS_KEY);return d?JSON.parse(d):null;}catch{return null;}
}
function lsSave(data){
  try{localStorage.setItem(LS_KEY,JSON.stringify(data));}catch{}
}

// ─────────────────────────────────────────────
// MERGE
// ─────────────────────────────────────────────
function mergeData(local,remote){
  function mergeArr(a,b){
    const map={};
    [...(a||[]),...(b||[])].forEach(x=>{if(x&&x.id)map[x.id]=x;});
    return Object.values(map).sort((x,y)=>(y.date||"").localeCompare(x.date||""));
  }
  return {
    expenses:  mergeArr(local.expenses,  remote.expenses),
    incomes:   mergeArr(local.incomes,   remote.incomes),
    shopping:  mergeArr(local.shopping,  remote.shopping),
    customCats:mergeArr(local.customCats,remote.customCats),
    photos:    {...(local.photos||{}),   ...(remote.photos||{})},
  };
}

// ─────────────────────────────────────────────
// DATA OPS
// ─────────────────────────────────────────────
let writeT=null, writing=false;

function upd(fn){
  const next=fn(S.data);
  S.data=next;
  lsSave(next);
  scheduleRender();
  scheduleWrite(next);
}

function scheduleWrite(data){
  if(writeT) clearTimeout(writeT);
  writing=true;
  writeT=setTimeout(async()=>{
    try{
      await gsRun("saveData",data);
      setSyncDot("ok");
    }catch{
      setSyncDot("err");
    }finally{writing=false;}
  },1500);
}

function setSyncDot(status){
  const dot=document.querySelector(".sync-dot");
  if(!dot)return;
  dot.style.background=status==="ok"?"var(--sage)":status==="err"?"var(--border2)":"var(--border)";
}

async function gsRun(fn,param){
  if(fn==="saveData"){
    const r=await fetch(PROXY_URL,{method:"POST",body:JSON.stringify(param),headers:{"Content-Type":"application/json"}});
    return r.json();
  }else{
    const r=await fetch(PROXY_URL,{method:"GET"});
    return r.json();
  }
}

// ─────────────────────────────────────────────
// LOAD — always keep local, merge on top
// ─────────────────────────────────────────────
let pollIv=null;

async function load(){
  // 1. Load local immediately
  const local=lsLoad();
  if(local){
    S.data=local;
  }
  // Always go to login first
  scheduleRender();

  // 2. Try server in background — NEVER discard local data
  try{
    const remote=await gsRun("getData");
    if(remote && typeof remote==="object"){
      const hasRemote=(remote.expenses?.length>0||remote.incomes?.length>0||remote.shopping?.length>0);
      if(hasRemote){
        const base=S.data&&(S.data.expenses?.length>0||S.data.incomes?.length>0)?S.data:EMPTY;
        S.data=mergeData(base,remote);
        lsSave(S.data);
      }
      S.online=true;
      setSyncDot("ok");
      scheduleRender();
    }
  }catch{
    // Keep local, mark offline
    S.online=false;
    setSyncDot("err");
  }
}

async function poll(){
  if(writing) return;
  try{
    const remote=await gsRun("getData");
    if(remote&&!writing){
      const hasRemote=(remote.expenses?.length>0||remote.incomes?.length>0);
      if(hasRemote){
        S.data=mergeData(S.data,remote);
        lsSave(S.data);
      }
      S.online=true;
      setSyncDot("ok");
      // Only re-render if on home/activity/dashboard (not mid-form)
      if(["home","activity","dashboard","shopping"].includes(S.tab)&&S.screen==="main"){
        scheduleRender();
      }
    }
  }catch{
    S.online=false;
    setSyncDot("err");
  }
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function getCats(){return [...DEFAULT_CATS,...(S.data.customCats||[])];}

function calcUser(uid){
  const expenses=S.data.expenses||[];
  const incomes=S.data.incomes||[];
  const uExp=expenses.filter(e=>e.user===uid);
  const uInc=incomes.filter(i=>i.user===uid);
  const totI=uInc.reduce((s,i)=>s+i.amount,0);
  const totE=uExp.reduce((s,e)=>s+e.amount,0);
  const sw=sowStr();
  const wkE=uExp.filter(e=>e.date>=sw).reduce((s,e)=>s+e.amount,0);
  return{totI,totE,bal:totI-totE,wkE,uExp};
}

// ─────────────────────────────────────────────
// DOM HELPERS
// ─────────────────────────────────────────────
const h=(tag,attr={},kids=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attr)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="id")el.id=v;
    else el.setAttribute(k,v);
  }
  for(const ch of kids){
    if(ch==null||ch===false)continue;
    el.appendChild(typeof ch==="string"?document.createTextNode(ch):ch);
  }
  return el;
};

// ─────────────────────────────────────────────
// ADD EXPENSE — key fix: numpad reads/writes S directly, no re-render on each key
// ─────────────────────────────────────────────
function sAdd(){
  const user=USERS.find(u=>u.id===S.activeUser)||USERS[0];
  const targetUser=USERS.find(u=>u.id===S.expUser)||user;
  const{amount,desc,cat,step}=S;
  const pane=h("div",{style:{padding:"0 24px",flex:"1"}});

  if(step===1){
    // Amount display — we update this directly without re-render
    const amtDisplay=h("div",{style:{fontSize:"54px",fontWeight:"800",letterSpacing:"-3px",lineHeight:"1",color:amount?targetUser.color:"var(--border2)",textAlign:"center",minHeight:"66px"}},
      [amount||"0"]);

    pane.appendChild(h("div",{style:{marginBottom:"28px",textAlign:"center"}},[
      h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text3)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"18px"}},["¿Cuánto gastaste?"]),
      h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"center",gap:"6px"}},[
        h("span",{style:{fontSize:"28px",fontWeight:"300",color:"var(--text3)",lineHeight:"1"}},["$"]),
        amtDisplay,
      ]),
    ]));

    // Numpad that mutates S.amount and updates display directly — NO set() call
    pane.appendChild(h("div",{className:"np"},["1","2","3","4","5","6","7","8","9","⌫","0","✓"].map(k=>{
      const st={};
      if(k==="✓"){st.background=targetUser.color;st.color="#fff";st.border="none";st.boxShadow=`0 6px 16px ${targetUser.color}50`;}
      else if(k==="⌫"){st.background="var(--bg)";st.color="var(--text2)";st.border="none";}
      return h("button",{className:"numkey tap",style:st,onClick:()=>{
        if(k==="⌫"){
          S.amount=S.amount.slice(0,-1);
        } else if(k==="✓"){
          if(S.amount) set({step:2}); // full render only on step change
          return;
        } else {
          if(S.amount.length<9) S.amount=S.amount+k;
        }
        // Update display in-place, no full re-render
        amtDisplay.textContent=S.amount||"0";
        amtDisplay.style.color=S.amount?targetUser.color:"var(--border2)";
      }},[k]);
    })));

  } else if(step===2){
    pane.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text3)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"18px",textAlign:"center"}},["¿En qué categoría?"]));
    pane.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}},[
      ...getCats().map(ct=>{
        const sel=cat===ct.id;
        return h("button",{className:"tap",style:{
          background:sel?ct.color:ct.bg,border:`1.5px solid ${sel?ct.color:ct.color+"30"}`,
          borderRadius:"16px",padding:"16px 8px",
          display:"flex",flexDirection:"column",alignItems:"center",gap:"7px",width:"100%",
          boxShadow:sel?`0 4px 14px ${ct.color}30`:"none",transition:"all 0.15s",
        },onClick:()=>set({cat:ct.id,step:3})},[
          mkIcon(ct.icon,22,sel?"#fff":ct.color),
          h("span",{style:{fontSize:"11px",fontWeight:"600",color:sel?"#fff":ct.color}},[ct.label]),
        ]);
      })
    ]));

  } else {
    // Step 3: confirm
    const ctObj=getCat(cat);
    pane.appendChild(h("div",{style:{textAlign:"center",marginBottom:"20px"}},[
      h("div",{style:{width:"56px",height:"56px",borderRadius:"18px",background:ctObj.bg,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}},[mkIcon(ctObj.icon,26,ctObj.color)]),
      h("div",{style:{fontSize:"38px",fontWeight:"800",color:"var(--text)",letterSpacing:"-2px",lineHeight:"1",marginBottom:"4px"}},[fmt(parseFloat(amount||0))]),
      h("div",{style:{fontSize:"12px",fontWeight:"600",color:ctObj.color,letterSpacing:"0.5px",textTransform:"uppercase"}},[ctObj.label]),
      h("div",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}},["→ "+targetUser.name]),
    ]));

    // Description input — uncontrolled, read value on save
    const inp=h("input",{className:"field",placeholder:"Descripción (opcional)",maxlength:"50",style:{textAlign:"center",marginBottom:"16px"}});
    inp.value=S.desc||"";
    // Update S.desc directly without re-render
    inp.addEventListener("input",e=>{ S.desc=e.target.value; });

    pane.appendChild(inp);
    if(cat==="mercaderia") pane.appendChild(h("div",{style:{fontSize:"11px",color:"var(--sage)",fontWeight:"600",textAlign:"center",marginBottom:"16px"}},["🌾 Se sumará a la lista"]));

    pane.appendChild(h("div",{style:{display:"flex",gap:"10px"}},[
      h("button",{className:"btn-out tap",style:{padding:"16px 18px"},onClick:()=>set({step:2})},["←"]),
      h("button",{className:"tap",style:{flex:"1",border:"none",borderRadius:"18px",padding:"16px",fontSize:"15px",fontWeight:"700",color:"#fff",background:targetUser.grad,boxShadow:`0 6px 18px ${targetUser.color}30`},onClick:()=>{
        const descVal=inp.value.trim();
        const exp={id:genId(),amount:parseFloat(S.amount||0),description:descVal,category:cat,user:S.expUser||S.activeUser,date:toStr()};
        upd(d=>({...d,
          expenses:[exp,...(d.expenses||[])],
          shopping:(cat==="mercaderia"&&descVal)?[{id:genId(),text:descVal,checked:false,from:"expense"},...(d.shopping||[])]:(d.shopping||[])
        }));
        S.amount=""; S.desc=""; S.cat=null; S.step=1; S.expUser=null;
        set({screen:"main",tab:"home"});
        showToast("✓ Gasto registrado");
      }},["Guardar"]),
    ]));
  }

  return h("div",{className:"screen"},[
    mkSubH(`Nuevo Gasto · ${targetUser.name}`,()=>{S.step=1;S.expUser=null;S.amount="";S.desc="";S.cat=null;set({screen:"main",tab:"home"});}),
    mkSteps(step,3,targetUser.color),
    pane,
  ]);
}

// ─────────────────────────────────────────────
// CHAT / AI
// ─────────────────────────────────────────────
function parseAmountFromText(t){
  t=t.toLowerCase().replace(/\./g,'').replace(/,/g,'.');
  let m;
  if(m=t.match(/(\d+(?:\.\d+)?)\s*k\b/))return parseFloat(m[1])*1000;
  if(m=t.match(/(\d+(?:\.\d+)?)\s*mil\b/))return parseFloat(m[1])*1000;
  if(m=t.match(/\$\s*(\d+(?:\.\d+)?)/))return parseFloat(m[1]);
  if(m=t.match(/(\d+(?:\.\d+)?)/))return parseFloat(m[1]);
  return 0;
}
function parseCatFromText(t){
  t=t.toLowerCase();
  if(/uber|taxi|remis|nafta|combustible|colect|subte|tren|bus|auto|peaje/.test(t))return"transporte";
  if(/super|mercado|verdura|carne|despensa|compra|almac/.test(t))return"mercaderia";
  if(/luz|gas|agua|internet|wifi|celular|netflix|spotify|disney|suscri|cable/.test(t))return"servicios";
  if(/médic|doctor|farmacia|remedio|salud|hospital|dental/.test(t))return"salud";
  if(/ropa|zapatilla|camiseta|jean|prenda|calzado/.test(t))return"ropa";
  if(/bar|restaurant|café|comida|pizza|sushi|almuerzo|cena|delivery/.test(t))return"ocio";
  return"otro";
}
function parseExpensesFromText(txt){
  const parts=txt.split(/\s+y\s+|\s*,\s*/i).filter(p=>p.trim());
  const res=[];
  for(const p of parts){
    const amount=parseAmountFromText(p);
    if(amount>0){
      const cat=parseCatFromText(p);
      const desc=p.trim().replace(/[\d.,]+\s*(k|mil|pesos)?/gi,'').replace(/\$/,'').trim()||getCat(cat).label;
      res.push({amount,category:cat,description:desc.slice(0,40),date:toStr()});
    }
  }
  return res;
}
async function parseWithAI(text,history){
  const cats=getCats().map(c=>c.id).join(', ');
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:400,
      system:`Parser de gastos para wallet familiar argentina. Categorías: ${cats}. Montos: 10k=10000. SOLO JSON: {"transactions":[{"amount":N,"category":"id","description":"str","date":"YYYY-MM-DD"}]} o {"transactions":[],"ask":"pregunta"}`,
      messages:[...history.slice(-6).map(m=>({role:m.role==="bot"?"assistant":"user",content:m.text})),{role:"user",content:text}]
    })
  });
  const d=await r.json();
  return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,'').trim());
}

function sChat(){
  const msgs=S.chatMsgs||[];

  // Chat is special: we manage its own update without full re-render
  const wrap=h("div",{className:"chat-wrap"});

  const header=h("div",{style:{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",background:"var(--white)",borderBottom:"1px solid var(--border)",padding:"52px 20px 14px",zIndex:50,display:"flex",alignItems:"center",gap:"12px"}},[
    h("button",{className:"bk tap",onClick:()=>set({screen:"main",tab:"home"})},["‹"]),
    h("div",{style:{flex:1}},[
      h("div",{style:{fontSize:"16px",fontWeight:"700",color:"var(--text"}},[" Registro IA"]),
      h("div",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"1px"}},["Escribí gastos en lenguaje natural"]),
    ]),
  ]);

  const msgsContainer=h("div",{className:"chat-msgs",id:"cmsgs"});
  function renderMsgs(){
    msgsContainer.innerHTML="";
    const allMsgs=S.chatMsgs||[];
    if(allMsgs.length===0){
      msgsContainer.appendChild(h("div",{style:{textAlign:"center",padding:"40px 20px"}},[
        h("div",{style:{width:"64px",height:"64px",borderRadius:"50%",background:"var(--sage-l)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}},[mkIcon("chart",28,"var(--sage)")]),
        h("div",{style:{fontSize:"16px",fontWeight:"700",color:"var(--text)",marginBottom:"8px"}},["Registrá con IA"]),
        h("div",{style:{fontSize:"13px",color:"var(--text3)",lineHeight:"1.7"}},["Escribí: pizza 1500 · uber 8k · gasté 12 mil en ropa"]),
      ]));
    }
    allMsgs.forEach(m=>{
      const bub=h("div",{style:{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}},[
        h("div",{className:`msg ${m.role==="user"?"u":"b"}`,style:{whiteSpace:"pre-wrap"}},[m.text]),
        ...(m.txs?[h("div",{className:"txc"},[...m.txs.map(tx=>h("div",{className:"txcr"},[
          h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[
            h("div",{style:{width:"28px",height:"28px",borderRadius:"50%",background:getCat(tx.category)?.bg||"var(--sage-l)",display:"flex",alignItems:"center",justifyContent:"center"}},[mkIcon(getCat(tx.category)?.icon||"cat-otro",14,getCat(tx.category)?.color||"var(--sage)")]),
            h("div",{style:{fontSize:"12px",fontWeight:"500",color:"var(--text)"}},[getCat(tx.category)?.label||tx.category]),
          ]),
          h("div",{style:{fontSize:"13px",fontWeight:"700",color:"var(--burg)"}},["-"+fmt(tx.amount)]),
        ]))])]:[ ]),
      ]);
      msgsContainer.appendChild(bub);
    });
    if(S.chatLoading) msgsContainer.appendChild(h("div",{className:"msg b ld"},["Analizando ✦"]));
    setTimeout(()=>msgsContainer.scrollTop=msgsContainer.scrollHeight,30);
  }
  renderMsgs();

  // Chat bar with textarea — completely uncontrolled
  const ta=h("textarea",{className:"cf",placeholder:'Ej: "pizza 1500"',rows:"1"});
  ta.addEventListener("input",()=>{
    S.chatInput=ta.value;
    ta.style.height="auto";
    ta.style.height=Math.min(ta.scrollHeight,80)+"px";
  });
  ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}});

  function sendChat(){
    const text=(ta.value||"").trim();
    if(!text||S.chatLoading) return;
    ta.value="";ta.style.height="auto";
    S.chatInput="";
    S.chatMsgs=[...S.chatMsgs,{role:"user",text,id:genId()}];
    S.chatLoading=true;
    renderMsgs();

    (async()=>{
      let parsed=null;
      if(S.online){
        try{parsed=await parseWithAI(text,S.chatMsgs.slice(0,-1));}catch{}
      }
      if(!parsed){
        const txs=parseExpensesFromText(text);
        parsed=txs.length>0?{transactions:txs}:{transactions:[],ask:"No entendí el monto. Ej: 'pizza 1500'"};
      }
      S.chatLoading=false;
      if(parsed.ask){
        S.chatMsgs=[...S.chatMsgs,{role:"bot",text:parsed.ask,id:genId()}];
        renderMsgs(); return;
      }
      if(!parsed.transactions?.length){
        S.chatMsgs=[...S.chatMsgs,{role:"bot",text:"No encontré gastos. Probá: 'pizza 1500'.",id:genId()}];
        renderMsgs(); return;
      }
      const exps=parsed.transactions.map(tx=>({id:genId(),amount:tx.amount,description:tx.description,category:tx.category,user:S.activeUser,date:tx.date||toStr()}));
      upd(d=>({...d,expenses:[...exps,...(d.expenses||[])]}));
      const txt2=parsed.transactions.length===1
        ?`✓ ${fmt(parsed.transactions[0].amount)} en ${getCat(parsed.transactions[0].category)?.label||"Gastos"}`
        :`✓ ${parsed.transactions.length} gastos guardados`;
      S.chatMsgs=[...S.chatMsgs,{role:"bot",text:txt2,id:genId(),txs:parsed.transactions}];
      renderMsgs();
      showToast("✓ Registrado");
    })();
  }

  const chatBar=h("div",{className:"chat-bar"},[ta,h("button",{className:"cs tap",onClick:sendChat},[mkIcon("plus",18,"#fff")])]);

  wrap.appendChild(header);
  wrap.appendChild(msgsContainer);
  wrap.appendChild(chatBar);
  return wrap;
}

function btImport(){
  const modal=document.createElement("div");
  modal.style.cssText="position:fixed;inset:0;background:rgba(42,30,20,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:24px";
  const box=document.createElement("div");
  box.style.cssText="background:var(--white);border-radius:20px;padding:24px;width:100%;max-width:350px";
  box.innerHTML="<div style='font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px'>Pegar datos</div>";
  const ta=document.createElement("textarea");
  ta.placeholder="Pegá aquí los datos copiados...";
  ta.style.cssText="width:100%;height:100px;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:13px;font-family:inherit;resize:none;background:var(--bg);";
  const btnRow=document.createElement("div");
  btnRow.style.cssText="display:flex;gap:10px;margin-top:14px";
  const cancel=document.createElement("button");
  cancel.textContent="Cancelar";cancel.style.cssText="flex:1;padding:13px;border-radius:999px;border:1.5px solid var(--border);background:var(--white);font-size:14px;font-weight:600;color:var(--text2);font-family:inherit;cursor:pointer";
  cancel.onclick=()=>document.body.removeChild(modal);
  const ok=document.createElement("button");
  ok.textContent="Importar";ok.style.cssText="flex:1;padding:13px;border-radius:999px;border:none;background:linear-gradient(135deg,var(--sage),var(--sage2));font-size:14px;font-weight:700;color:#fff;font-family:inherit;cursor:pointer";
  ok.onclick=()=>{
    try{
      const parsed=JSON.parse(ta.value);
      const remote=parsed.data||parsed;
      upd(()=>mergeData(S.data,remote));
      document.body.removeChild(modal);
      showToast("✓ Datos importados");
    }catch{showToast("Error: datos inválidos");}
  };
  btnRow.appendChild(cancel);btnRow.appendChild(ok);
  box.appendChild(ta);box.appendChild(btnRow);
  modal.appendChild(box);document.body.appendChild(modal);
  modal.addEventListener("click",e=>{if(e.target===modal)document.body.removeChild(modal);});
}

// ─────────────────────────────────────────────
// MAIN RENDER — replaces #app content cleanly
// ─────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(!app) return;

  // Build new content
  const frag=document.createDocumentFragment();

  if(S.toast){
    frag.appendChild(h("div",{className:"toast"},[S.toast]));
  }

  const screens={
    loading: sLoading,
    login:   sLogin,
    main:    sMain,
    add:     sAdd,
    income:  sIncome,
    newcat:  sNewCat,
    chat:    sChat,
  };

  const screenFn=screens[S.screen]||sLoading;
  frag.appendChild(screenFn());

  // Clear and replace — single DOM operation, minimizes reflow
  app.innerHTML="";
  app.appendChild(frag);
}
