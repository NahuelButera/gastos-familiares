<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Mi Wallet"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Mi Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  :root{
    /* Exact palette from Mabank wallet template */
    --bg:#F5F3FF;
    --bg2:#EDE9FE;
    --white:#FFFFFF;
    --surface:#FFFFFF;
    --border:#E9E5F8;
    --border2:#D4CCF0;
    --text:#1A0A3C;
    --text2:#4B4671;
    --gray:#9590B0;
    --gray-light:#C4C0D8;
    --purple:#5B21B6;
    --purple2:#4C1D95;
    --purple3:#6D28D9;
    --violet:#7C3AED;
    --violet2:#8B5CF6;
    --purple-light:#EDE9FE;
    --purple-mid:#C4B5FD;
    --purple-card:linear-gradient(135deg,#7C3AED 0%,#4C1D95 100%);
    --danger:#EF4444;
    --danger-light:#FEF2F2;
    --success:#10B981;
    --success-light:#D1FAE5;
    --amber:#F59E0B;
    --amber-light:#FEF3C7;
    --shadow:0 1px 4px rgba(91,33,182,0.06),0 4px 12px rgba(91,33,182,0.08);
    --shadow-md:0 4px 16px rgba(91,33,182,0.12),0 1px 4px rgba(91,33,182,0.06);
    --shadow-lg:0 8px 32px rgba(91,33,182,0.18);
    --shadow-card:0 12px 40px rgba(91,33,182,0.35);
    --r:16px;--r-sm:12px;--r-xs:8px;--r-full:999px;
  }

  /* ── RESET ── */
  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;width:100%;overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
  button,input,textarea{font-family:'Inter',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none}

  /* ── ANIMATIONS ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fall{0%{top:-40px;opacity:1}80%{opacity:.85}100%{top:110%;opacity:0;transform:translateX(var(--drift,0)) rotate(var(--rot,0))}}
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
  @keyframes ripple{from{transform:scale(0);opacity:0.4}to{transform:scale(2.5);opacity:0}}

  /* ── SCREEN ── */
  .screen{
    min-height:100vh;
    padding-bottom:100px;
    overflow-y:auto;
    background:var(--bg);
    animation:fadeUp 0.22s ease;
  }

  /* ── TAP FEEDBACK ── */
  .tap{transition:transform 0.1s,opacity 0.1s}
  .tap:active{transform:scale(0.96);opacity:0.82}

  /* ── TOAST ── */
  .toast{
    position:fixed;top:24px;left:50%;transform:translateX(-50%);
    background:var(--text);color:#fff;
    padding:10px 24px;border-radius:var(--r-full);
    font-size:13px;font-weight:600;
    z-index:2000;white-space:nowrap;
    box-shadow:0 8px 24px rgba(26,10,60,0.3);
    animation:fadeUp 0.2s ease;
    letter-spacing:0.1px;
  }

  /* ── SYNC DOT ── */
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:background 0.4s;display:inline-block}
  .spinner{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--purple);animation:spin 0.8s linear infinite}

  /* ── BOTTOM NAV — Dark pill like template ── */
  .bottom-nav{
    position:fixed;bottom:16px;
    left:50%;transform:translateX(-50%);
    width:calc(100% - 32px);max-width:390px;
    background:#1A0A3C;
    border-radius:28px;
    display:flex;align-items:center;
    padding:8px 4px 8px;
    z-index:100;
    box-shadow:0 8px 32px rgba(26,10,60,0.4),0 2px 8px rgba(26,10,60,0.2);
    gap:0;
  }
  .nav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    border:none;border-radius:18px;padding:9px 4px;
    font-size:10px;font-weight:600;
    color:rgba(255,255,255,0.38);
    background:transparent;transition:all 0.2s;
    letter-spacing:0.2px;
    min-width:0;
  }
  .nav-btn.active{color:#fff;background:rgba(255,255,255,0.1)}
  .nav-icon-inner{
    width:24px;height:24px;display:flex;
    align-items:center;justify-content:center;
    transition:all 0.2s;
  }

  /* Center AI fab in nav */
  .nav-fab{
    width:52px;height:52px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,#8B5CF6,#5B21B6);
    border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 16px rgba(91,33,182,0.5),0 0 0 4px rgba(139,92,246,0.2);
    margin:0 2px;position:relative;top:-8px;
    transition:all 0.15s;
  }
  .nav-fab:active{transform:scale(0.9)}

  /* ── WALLET CARD — main purple gradient ── */
  .wallet-card{
    border-radius:24px;padding:26px 24px 22px;
    background:linear-gradient(135deg,#7C3AED 0%,#4C1D95 100%);
    color:#fff;position:relative;overflow:hidden;
    box-shadow:var(--shadow-card);
  }
  .wallet-card::before{
    content:"";position:absolute;top:-60px;right:-60px;
    width:180px;height:180px;border-radius:50%;
    background:rgba(255,255,255,0.07);pointer-events:none;
  }
  .wallet-card::after{
    content:"";position:absolute;bottom:-80px;left:-30px;
    width:160px;height:160px;border-radius:50%;
    background:rgba(255,255,255,0.04);pointer-events:none;
  }

  /* ── ACTION ROW ── */
  .act-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .act-item{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1}
  .act-circle{
    width:52px;height:52px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    transition:all 0.15s;border:none;flex-shrink:0;
  }
  .act-circle:active{transform:scale(0.9)}
  .act-label{font-size:11px;font-weight:500;color:var(--gray);text-align:center;white-space:nowrap}

  /* ── SURFACE CARD ── */
  .scard{
    background:var(--white);border-radius:var(--r);
    border:1px solid var(--border);
    box-shadow:var(--shadow);
    padding:16px;
  }

  /* ── SECTION TITLE ROW ── */
  .sec-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .sec-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.2px}
  .sec-link{font-size:12px;font-weight:600;color:var(--violet);cursor:pointer}

  /* ── TRANSACTION ROW ── */
  .tx-row{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--border)}
  .tx-row:last-child{border-bottom:none;padding-bottom:0}
  .tx-avatar{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;overflow:hidden;
  }
  .tx-name{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx-sub{font-size:11px;color:var(--gray);margin-top:2px;font-weight:400}
  .tx-amount{font-size:13px;font-weight:700;color:var(--danger);white-space:nowrap}
  .tx-amount.income{color:var(--success)}

  /* ── FIELD ── */
  .field{
    width:100%;background:var(--bg);
    border:1.5px solid var(--border);
    border-radius:var(--r-sm);
    padding:14px 16px;font-size:14px;color:var(--text);
    font-weight:500;transition:all 0.2s;
  }
  .field:focus{border-color:var(--violet);background:var(--white);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
  .field::placeholder{color:var(--gray-light);font-weight:400}

  /* ── BUTTONS ── */
  .btn-primary{
    border:none;border-radius:var(--r-full);padding:16px;
    font-size:15px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,var(--violet),var(--purple));
    width:100%;
    box-shadow:0 6px 20px rgba(91,33,182,0.35);
    transition:all 0.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;
    letter-spacing:-0.1px;
  }
  .btn-primary:active{transform:scale(0.98);opacity:0.9}
  .btn-outline{
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--r-full);padding:14px 22px;
    font-size:14px;font-weight:600;color:var(--text2);
    transition:all 0.15s;
  }
  .btn-outline:active{background:var(--bg2)}
  .btn-ghost{background:none;border:none;color:var(--violet);font-size:13px;font-weight:600;padding:0}

  /* ── NUMPAD ── */
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:320px;margin:0 auto;width:100%}
  .numkey{
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--r);padding:16px 0;
    font-size:22px;font-weight:600;color:var(--text);
    box-shadow:var(--shadow);transition:all 0.1s;width:100%;
  }
  .numkey:active{transform:scale(0.91);background:var(--purple-light);border-color:var(--purple-mid)}

  /* ── CATEGORY GRID ── */
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .cat-btn{
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--r);padding:16px 8px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:all 0.15s;box-shadow:var(--shadow);cursor:pointer;
  }
  .cat-btn:active{transform:translateY(-2px)}
  .cat-btn.sel{border-color:var(--violet);background:var(--purple-light);box-shadow:0 4px 12px rgba(124,58,237,0.2)}

  /* ── STEPS ── */
  .step-bar{height:3px;border-radius:var(--r-full);background:var(--border);flex:1;transition:all 0.3s}
  .step-bar.on{background:linear-gradient(90deg,var(--violet),var(--purple))}

  /* ── AMOUNT DISPLAY ── */
  .amt-big{font-size:54px;font-weight:800;letter-spacing:-2px;line-height:1}
  .confirm-amt{font-size:40px;font-weight:800;letter-spacing:-2px;line-height:1}

  /* ── BACK BTN ── */
  .back-btn{
    width:36px;height:36px;border-radius:50%;
    border:1.5px solid var(--border);background:var(--white);
    color:var(--text);font-size:16px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);flex-shrink:0;transition:all 0.15s;
  }
  .back-btn:active{background:var(--bg2)}

  /* ── SUBHEADER ── */
  .sub-hdr{
    padding:52px 20px 16px;
    display:flex;align-items:center;gap:12px;
    background:var(--bg);
  }

  /* ── USER DOT ── */
  .user-dot{
    border-radius:50%;border:none;
    font-weight:800;display:flex;align-items:center;justify-content:center;
    overflow:hidden;flex-shrink:0;cursor:pointer;
    transition:all 0.2s;
  }
  .user-dot img{width:100%;height:100%;object-fit:cover;display:block}

  /* ── CHECK ── */
  .check{
    width:22px;height:22px;border-radius:50%;
    border:2px solid var(--border2);background:none;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:700;color:#fff;
    flex-shrink:0;transition:all 0.15s;
  }
  .check.done{background:var(--violet);border-color:var(--violet)}

  /* ── PIN ── */
  .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:all 0.18s}
  .pin-dot.on{background:var(--violet);border-color:var(--violet);transform:scale(1.2);box-shadow:0 3px 10px rgba(124,58,237,0.4)}
  .pin-dot.err{background:var(--danger);border-color:var(--danger)}
  .pin-key{
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--r);padding:16px 0;
    font-size:20px;font-weight:600;color:var(--text);
    cursor:pointer;transition:all 0.1s;width:100%;
  }
  .pin-key:active{background:var(--purple-light);border-color:var(--purple-mid);transform:scale(0.92)}
  .pin-key.heart{background:var(--purple-light);color:var(--violet);border-color:var(--purple-mid)}
  .pin-key.del{background:transparent;border:none;color:var(--gray);font-size:18px;opacity:0.7}

  /* ── CHAT ── */
  .chat-wrap{display:flex;flex-direction:column;height:100vh;background:var(--bg)}
  .chat-msgs{
    flex:1;overflow-y:auto;
    padding:80px 16px 20px;
    display:flex;flex-direction:column;gap:10px;
  }
  .msg{
    max-width:82%;padding:12px 16px;
    border-radius:20px;font-size:14px;
    line-height:1.5;animation:msgIn 0.22s ease;
    font-weight:500;
  }
  .msg.user{
    background:linear-gradient(135deg,var(--violet),var(--purple));
    color:#fff;align-self:flex-end;
    border-bottom-right-radius:6px;
  }
  .msg.bot{
    background:var(--white);color:var(--text);
    align-self:flex-start;border-bottom-left-radius:6px;
    box-shadow:var(--shadow);border:1px solid var(--border);
  }
  .msg.bot.loading{opacity:0.55}
  .chat-input-row{
    padding:12px 16px;background:var(--white);
    border-top:1px solid var(--border);
    display:flex;gap:10px;align-items:center;
  }
  .chat-field{
    flex:1;background:var(--bg);
    border:1.5px solid var(--border);
    border-radius:var(--r-full);
    padding:11px 18px;font-size:14px;color:var(--text);
    resize:none;max-height:80px;line-height:1.4;
    font-family:'Inter',sans-serif;
  }
  .chat-field:focus{border-color:var(--violet)}
  .chat-send{
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,var(--violet),var(--purple));
    border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 10px rgba(91,33,182,0.35);flex-shrink:0;
    transition:all 0.15s;
  }
  .chat-send:active{transform:scale(0.9)}
  .tx-confirm{
    background:var(--purple-light);
    border:1.5px solid var(--purple-mid);
    border-radius:var(--r);padding:12px 14px;margin-top:6px;
  }
  .tx-confirm-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .tx-confirm-row:last-child{margin-bottom:0}

  /* ── LOGIN ── */
  .login-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--white)}

  /* ── RAIN ── */
  .raindrop{position:fixed;top:-40px;animation:fall linear forwards;pointer-events:none;z-index:9998}
  #love-msg.show{opacity:1!important;transform:translateY(0)!important}

  /* ── SEGMENTED CONTROL ── */
  .seg-ctrl{
    display:flex;background:var(--bg2);
    border:1px solid var(--border);border-radius:var(--r-full);
    padding:3px;gap:2px;
  }
  .seg-btn{
    flex:1;padding:7px 12px;border-radius:var(--r-full);border:none;
    font-size:12px;font-weight:600;color:var(--gray);
    background:transparent;transition:all 0.18s;
  }
  .seg-btn.active{background:var(--white);color:var(--purple);box-shadow:var(--shadow)}

  /* ── DASHBOARD STAT CARD ── */
  .stat-card{
    background:var(--white);border-radius:var(--r);
    border:1px solid var(--border);box-shadow:var(--shadow);
    padding:16px;flex:1;
  }

  /* ── PROGRESS BAR ── */
  .progress-track{height:6px;background:var(--bg2);border-radius:var(--r-full);overflow:hidden;margin-top:8px}
  .progress-fill{height:100%;border-radius:var(--r-full);transition:width 0.5s ease}

  /* ── BADGE ── */
  .badge-pill{
    font-size:10px;font-weight:700;
    background:var(--purple-light);color:var(--violet);
    padding:3px 10px;border-radius:var(--r-full);
    display:inline-block;letter-spacing:0.2px;
  }
  .badge-danger{background:var(--danger-light);color:var(--danger)}
  .badge-success{background:var(--success-light);color:var(--success)}

  /* Util */
  .flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.w-full{width:100%}.flex-1{flex:1}.text-center{text-align:center}
  .mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-5{margin-top:20px}
  .mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}.mb-6{margin-bottom:24px}
  .px-5{padding-left:20px;padding-right:20px}.py-4{padding-top:16px;padding-bottom:16px}
  .rounded-full{border-radius:var(--r-full)}.rounded{border-radius:var(--r)}.rounded-sm{border-radius:var(--r-sm)}
  .text-xs{font-size:11px}.text-sm{font-size:13px}.text-base{font-size:15px}.text-lg{font-size:18px}.text-xl{font-size:22px}.text-2xl{font-size:28px}
  .font-medium{font-weight:500}.font-semibold{font-weight:600}.font-bold{font-weight:700}.font-extrabold{font-weight:800}
  .text-purple{color:var(--violet)}.text-gray{color:var(--gray)}.text-danger{color:var(--danger)}.text-success{color:var(--success)}
  .bg-white{background:var(--white)}.bg-purple-light{background:var(--purple-light)}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
</style>
</head>
<body>
<div id="app"></div>
<div id="rain-layer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:9999"></div>
<div id="love-msg" style="position:fixed;bottom:110px;left:0;width:100%;text-align:center;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--purple);opacity:0;transform:translateY(10px);transition:all 0.5s ease;pointer-events:none;text-shadow:0 1px 8px rgba(255,255,255,0.95);z-index:10000;padding:0 24px;line-height:1.5"></div>
<script>


const DEFAULT_CATS=[
  {id:"mercaderia",label:"Mercado",icon:"cat-mercado",color:"#7C3AED",bg:"#EDE9FE"},
  {id:"servicios",label:"Servicios",icon:"cat-servicios",color:"#5B21B6",bg:"#F3F0FF"},
  {id:"transporte",label:"Transporte",icon:"cat-transporte",color:"#4C1D95",bg:"#EDE9FE"},
  {id:"salud",label:"Salud",icon:"cat-salud",color:"#8B5CF6",bg:"#F5F3FF"},
  {id:"ocio",label:"Ocio",icon:"cat-ocio",color:"#6D28D9",bg:"#EDE9FE"},
  {id:"ropa",label:"Ropa",icon:"cat-ropa",color:"#7C3AED",bg:"#F3F0FF"},
  {id:"otro",label:"Otro",icon:"cat-otro",color:"#5B21B6",bg:"#F5F3FF"},
];

// Kubayar card colors per user/purpose
const CARD_COLORS=["kub-card-blue","kub-card-orange","kub-card-purple","kub-card-red","kub-card-green"];

const USERS=[
  {id:"N",name:"Nahuel",color:"#5B21B6",grad:"linear-gradient(135deg,#7C3AED,#4C1D95)",photo:null},
  {id:"F",name:"Florencia",color:"#8B5CF6",grad:"linear-gradient(135deg,#A78BFA,#7C3AED)",photo:null},
  {id:"V",name:"Vitto",color:"#F59E0B",grad:"linear-gradient(135deg,#FCD34D,#D97706)",photo:null},
];
const EMPTY={expenses:[],incomes:[],shopping:[],customCats:[],photos:{}};
const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
const toStr=()=>new Date().toISOString().split("T")[0];
const sowStr=()=>{const d=new Date();d.setDate(d.getDate()-d.getDay());return d.toISOString().split("T")[0];};
const getCat=id=>(typeof S!=="undefined"?[...DEFAULT_CATS,...(S.data.customCats||[])]:DEFAULT_CATS).find(x=>x.id===id)||DEFAULT_CATS[6]||{icon:"cat-otro",color:"var(--gray)",bg:"var(--bg)",label:"Otro"};
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// Proxy URL — sin CORS
const PROXY_URL="/api/sync";

function mkSVG(path,size,color){

}

async function gsRun(fn,param){
  if(fn==="saveData"){
    const r=await fetch(PROXY_URL,{method:"POST",body:JSON.stringify(param),headers:{"Content-Type":"application/json"}});
    return await r.json();
  } else {
    const r=await fetch(PROXY_URL,{method:"GET"});
    return await r.json();
  }
}

let S={
  screen:"loading",tab:"home",
  activeUser:localStorage.getItem("gf_user")||null,
  data:EMPTY,syncing:false,online:false,toast:null,loginPin:"",loginUser:null,loginErr:false,cardColor:null,cardGrad:null,expUser:null,newCat:{name:"",color:"#6D28D9",icon:"cat-otro"},loginPin:"",loginUser:null,loginErr:false,
  amount:"",desc:"",cat:null,step:1,
  incAmt:"",incDesc:"",incStep:1,
};
function getCats(){return [...DEFAULT_CATS,...(S.data.customCats||[])];}

let pollIv=null,writeT=null,toastT=null,writing=false;

function set(patch){S={...S,...patch};render();}
function showToast(msg){if(toastT)clearTimeout(toastT);set({toast:msg});toastT=setTimeout(()=>set({toast:null}),2500);}

async function load(){
  set({syncing:true});
  try{const d=await gsRun("getData");set({data:d||EMPTY,online:true,syncing:false,screen:"login"});}
  catch{set({online:false,syncing:false,screen:"login"});}
}

function scheduleWrite(data){
  if(writeT)clearTimeout(writeT);
  writing=true;
  writeT=setTimeout(async()=>{
    try{
      await gsRun("saveData",data);
      set({online:true});
    }catch{
      set({online:false});
    }finally{
      writing=false;
    }
  },800);
}

async function poll(){
  // No polling mientras se está escribiendo
  if(writing)return;
  try{
    const d=await gsRun("getData");
    if(d&&!writing){
      S.data=d;
      S.online=true;
      if(S.screen==="main"&&S.tab==="home"){
        updateNums();
      }
      const dot=document.querySelector(".sync-dot");
      if(dot)dot.style.background="var(--violet)";
    }
  }
  catch{
    S.online=false;
    const dot=document.querySelector(".sync-dot");
    if(dot)dot.style.background="var(--border)";
  }
}

function updateNums(){
  const expenses=S.data.expenses||[];
  const incomes=S.data.incomes||[];
  const shBal=incomes.reduce((s,i)=>s+i.amount,0)-expenses.reduce((s,e)=>s+e.amount,0);
  const e=id=>document.getElementById(id);

  // Actualiza cada usuario por separado con sus IDs únicos
  USERS.forEach(u=>{
    const cv=calcUser(u.id);
    if(e(`bal-${u.id}`))e(`bal-${u.id}`).textContent=fmt(cv.bal);
    if(e(`inc-${u.id}`))e(`inc-${u.id}`).textContent=fmt(cv.totI);
    if(e(`exp-${u.id}`))e(`exp-${u.id}`).textContent=fmt(cv.totE);
  });

  // Semana del usuario activo
  const cvActive=calcUser(S.activeUser);
  if(e("n-wk"))e("n-wk").textContent=fmt(cvActive.wkE);
  if(e("n-shared"))e("n-shared").textContent=fmt(shBal);

  const unread=(S.data.shopping||[]).filter(s=>!s.checked).length;
  if(e("shop-badge")){e("shop-badge").textContent=unread;e("shop-badge").style.display=unread>0?"inline-flex":"none";}
}

function upd(fn){const next=fn(S.data);set({data:next});scheduleWrite(next);}

function saveExp(){
  if(!S.amount||!S.cat)return;
  const exp={id:genId(),amount:parseFloat(S.amount),description:S.desc,category:S.cat,user:S.expUser||S.activeUser,date:toStr()};
  upd(d=>({...d,expenses:[exp,...(d.expenses||[])],shopping:(S.cat==="mercaderia"&&S.desc.trim())?[{id:genId(),text:S.desc.trim(),checked:false,from:"expense"},...(d.shopping||[])]:(d.shopping||[])}));
  set({amount:"",desc:"",cat:null,step:1,expUser:null,screen:"main",tab:"home"});
  showToast("✓ Gasto registrado");
}

function saveInc(){
  if(!S.incAmt)return;
  const inc={id:genId(),amount:parseFloat(S.incAmt),description:S.incDesc||"Sueldo",user:S.activeUser,date:toStr()};
  upd(d=>({...d,incomes:[inc,...(d.incomes||[])]}));
  set({incAmt:"",incDesc:"",incStep:1,screen:"main",tab:"home"});
  showToast("✓ Ingreso registrado");
}

function calcUser(uid){
  const expenses=S.data.expenses||[];
  const incomes=S.data.incomes||[];
  const uExp=expenses.filter(e=>e.user===uid);
  const uInc=incomes.filter(i=>i.user===uid);
  const totI=uInc.reduce((s,i)=>s+i.amount,0);
  const totE=uExp.reduce((s,e)=>s+e.amount,0);
  const sw=sowStr();
  const wkE=uExp.filter(e=>e.date>=sw).reduce((s,e)=>s+e.amount,0);
  const dow=new Date().getDay()||7;
  return{totI,totE,bal:totI-totE,wkE,fore:(wkE/dow)*(7-dow),uExp};
}

const h=(tag,attr={},kids=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attr)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="id")el.id=v;
    else el.setAttribute(k,v);
  }
  for(const ch of kids){if(ch==null)continue;el.appendChild(typeof ch==="string"?document.createTextNode(ch):ch);}
  return el;
};

function mkCardCarousel(cards){
  // Account list style — colored left bar + row layout
  const wrap=document.createElement("div");
  wrap.style.cssText="margin:0 24px";

  const container=document.createElement("div");
  container.style.cssText="background:var(--white);border-radius:20px;box-shadow:var(--shadow-md);border:1px solid var(--border);overflow:hidden";

  // Header row
  const hdr=document.createElement("div");
  hdr.style.cssText="padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)";
  const htxt=document.createElement("div");
  htxt.style.cssText="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase";
  htxt.textContent="Saldos";
  const hcount=document.createElement("div");
  hcount.style.cssText="font-size:10px;font-weight:600;color:var(--text3)";
  hcount.textContent=cards.length+" cuentas";
  hdr.appendChild(htxt);hdr.appendChild(hcount);
  container.appendChild(hdr);

  cards.forEach((card,i)=>{
    const row=document.createElement("div");
    row.style.cssText=`display:flex;align-items:center;padding:14px 16px;border-bottom:${i<cards.length-1?"1px solid var(--border)":"none"};cursor:pointer;transition:background 0.15s`;
    row.addEventListener("mouseover",()=>row.style.background="var(--bg)");
    row.addEventListener("mouseout",()=>row.style.background="");

    // Color bar left
    const bar=document.createElement("div");
    bar.style.cssText=`width:4px;height:36px;border-radius:2px;background:${card.color};margin-right:14px;flex-shrink:0`;

    // Icon circle
    const icon=document.createElement("div");
    icon.style.cssText=`width:36px;height:36px;border-radius:12px;background:${card.color}18;display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;font-size:13px;font-weight:800;color:${card.color}`;
    icon.textContent=card.label.charAt(0);

    // Text
    const txt=document.createElement("div");
    txt.style.cssText="flex:1;min-width:0";
    const name=document.createElement("div");
    name.style.cssText="font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.2px";
    name.textContent=card.label;
    const sub=document.createElement("div");
    sub.style.cssText="font-size:10px;color:var(--text3);margin-top:2px;font-weight:500";
    // Stats summary
    const inc=card.stats[0]?card.stats[0].val:"";
    const exp=card.stats[1]?card.stats[1].val:"";
    sub.textContent=`↑ ${inc}  ↓ ${exp}`;
    txt.appendChild(name);txt.appendChild(sub);

    // Amount
    const amt=document.createElement("div");
    amt.style.cssText="text-align:right;flex-shrink:0";
    const amtVal=document.createElement("div");
    amtVal.id=card.id;
    const isNeg=card.amount.includes("-");
    amtVal.style.cssText=`font-size:16px;font-weight:800;color:${isNeg?"var(--danger)":"var(--text)"};letter-spacing:-0.5px`;
    amtVal.textContent=card.amount;
    // Week badge
    const wk=card.stats[2];
    if(wk){
      const wkEl=document.createElement("div");
      wkEl.id=wk.id||"";
      wkEl.style.cssText=`font-size:10px;font-weight:600;color:var(--text3);margin-top:2px;text-align:right`;
      wkEl.textContent=`sem: ${wk.val}`;
      amt.appendChild(amtVal);amt.appendChild(wkEl);
    } else {
      amt.appendChild(amtVal);
    }

    row.appendChild(bar);row.appendChild(icon);row.appendChild(txt);row.appendChild(amt);
    container.appendChild(row);
  });

  // Total row at bottom
  const total=document.createElement("div");
  total.style.cssText="padding:12px 16px;background:var(--bg);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)";
  const tlbl=document.createElement("div");
  tlbl.style.cssText="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.5px";
  tlbl.textContent="TOTAL FAMILIA";
  const tval=document.createElement("div");
  tval.id="n-shared";
  tval.style.cssText="font-size:18px;font-weight:800;color:var(--purple);letter-spacing:-0.8px";
  total.appendChild(tlbl);total.appendChild(tval);
  container.appendChild(total);

  wrap.appendChild(container);
  return wrap;
}

function sChat(){
  const msgs=S.chatMsgs||[];
  const input=S.chatInput||"";
  const loading=S.chatLoading||false;
  const user=USERS.find(u=>u.id===S.activeUser)||USERS[0];
  function sendMsg(){
    const text=(S.chatInput||"").trim();
    if(!text)return;
    const newMsgs=[...msgs,{role:"user",text,id:genId()}];
    set({chatMsgs:newMsgs,chatInput:"",chatLoading:true});
    (async()=>{
      let parsed=null;
      if(S.online){try{parsed=await parseWithAI(text,msgs);}catch(e){}}
      if(!parsed){const txs=parseExpensesFromText(text);parsed=txs.length>0?{transactions:txs}:{transactions:[],ask:"No entendí el monto. ¿Podés repetirlo? Ej: 'pizza 1500'"};}
      const botMsgs=[...(S.chatMsgs||[])];
      if(parsed.ask){botMsgs.push({role:"bot",text:parsed.ask,id:genId()});set({chatMsgs:botMsgs,chatLoading:false});return;}
      if(!parsed.transactions?.length){botMsgs.push({role:"bot",text:"No encontré ningún gasto. Intentá con 'pizza 1500' o 'uber 800'.",id:genId()});set({chatMsgs:botMsgs,chatLoading:false});return;}

        ]))])]:[]),
      ])),
      loading?h("div",{className:"msg bot loading"},["Analizando ✦"]):null,
    ]),
    h("div",{className:"chat-input-row",style:{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"430px",paddingBottom:"calc(16px + env(safe-area-inset-bottom))"}},[
      (()=>{
        const ta=h("textarea",{className:"chat-field",placeholder:'Ej: "pizza 1500" o "uber 8k"',rows:"1"});
        ta.value=input;
        ta.addEventListener("input",e=>{set({chatInput:e.target.value});ta.style.height="auto";ta.style.height=Math.min(ta.scrollHeight,80)+"px";});
        ta.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});
        return ta;
      })(),
      h("button",{className:"chat-send tap",style:{opacity:loading?"0.5":"1"},onClick:sendMsg},[mkIcon("plus",18,"#fff")]),
    ]),
  ]);
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(S.toast)app.appendChild(h("div",{className:"toast"},[S.toast]));
  app.appendChild(h("div",{className:"sync-row"},[
    ...(S.syncing?[h("div",{className:"spinner"})]: []),
    h("div",{className:"sync-dot",style:{background:S.online?"var(--purple)":"var(--border)"}}),
  ]));
  const screens={loading:sLoading,pick:sPick,login:sLogin,main:sMain,add:sAdd,income:sIncome,newcat:sNewCat,chat:sChat};
  app.appendChild((screens[S.screen]||sLoading)());
}

render();
load().then(()=>{if(pollIv)clearInterval(pollIv);pollIv=setInterval(poll,6000);});


</script>
</body>
</html>
