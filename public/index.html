<script>
const CATS=[
  {id:"mercaderia",label:"Mercadería",icon:"🛒",color:"#2979FF",bg:"#EBF3FF"},
  {id:"servicios",label:"Servicios",icon:"⚡",color:"#FF9800",bg:"#FFF4E5"},
  {id:"transporte",label:"Transporte",icon:"🚗",color:"#9C27B0",bg:"#F9F0FF"},
  {id:"salud",label:"Salud",icon:"🏥",color:"#F44336",bg:"#FFF0F0"},
  {id:"ocio",label:"Ocio",icon:"🎬",color:"#00C48C",bg:"#E8FAF4"},
  {id:"ropa",label:"Ropa",icon:"👕",color:"#6C5CE7",bg:"#EEF0FF"},
  {id:"otro",label:"Otro",icon:"📦",color:"#6B7280",bg:"#F3F4F6"},
];

const USERS=[
  {id:"N",name:"Nahuel",color:"#2979FF"},
  {id:"F",name:"Florencia",color:"#9C27B0"},
];

// ✅ IMPORTANTE: ahora tiene versionado
const EMPTY={expenses:[],incomes:[],shopping:[],updatedAt:0};

const fmt=n=>new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
const toStr=()=>new Date().toISOString().split("T")[0];
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

const PROXY_URL="/api/sync";

async function gsRun(fn,param){
  if(fn==="saveData"){
    const r=await fetch(PROXY_URL,{method:"POST",body:JSON.stringify(param),headers:{"Content-Type":"application/json"}});
    return await r.json();
  } else {
    const r=await fetch(PROXY_URL,{method:"GET"});
    return await r.json();
  }
}

let S={
  screen:"loading",
  activeUser:localStorage.getItem("gf_user")||null,
  data:EMPTY,
  syncing:false,
  online:false
};

let pollIv=null,writeT=null,writing=false;

function set(patch){S={...S,...patch};render();}

/* =========================
   ✅ WRITE (CON VERSION)
========================= */
function scheduleWrite(data){
  if(writeT)clearTimeout(writeT);
  writing=true;

  writeT=setTimeout(async()=>{
    try{
      await gsRun("saveData",data);
      set({online:true});
    }catch{
      set({online:false});
    }finally{
      writing=false;
    }
  },500);
}

/* =========================
   ✅ UPDATE DATA
========================= */
function upd(fn){
  const next=fn(S.data);

  const withVersion={
    ...next,
    updatedAt:Date.now()
  };

  set({data:withVersion});
  scheduleWrite(withVersion);
}

/* =========================
   ✅ POLL PRO (ANTI-BUG)
========================= */
async function poll(){
  if(writing)return;

  try{
    const d=await gsRun("getData");
    if(!d)return;

    const localVer=S.data?.updatedAt||0;
    const remoteVer=d.updatedAt||0;

    // ✅ SOLO actualiza si es más nuevo
    if(remoteVer>localVer){
      set({data:d,online:true});
    }
  }catch{
    set({online:false});
  }
}

/* =========================
   ✅ LOAD
========================= */
async function load(){
  try{
    const d=await gsRun("getData");
    set({
      data:d||EMPTY,
      online:true,
      screen:S.activeUser?"main":"login"
    });
  }catch{
    set({
      online:false,
      screen:S.activeUser?"main":"login"
    });
  }
}

/* =========================
   ✅ SAVE FUNCTIONS
========================= */
function saveExp(){
  const exp={
    id:genId(),
    amount:100, // ejemplo
    user:S.activeUser,
    date:toStr()
  };

  upd(d=>({...d,expenses:[exp,...d.expenses]}));
}

function saveInc(){
  const inc={
    id:genId(),
    amount:100,
    user:S.activeUser,
    date:toStr()
  };

  upd(d=>({...d,incomes:[inc,...d.incomes]}));
}

/* =========================
   ✅ RENDER SIMPLE (demo)
========================= */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  app.innerHTML=`
    <div style="padding:20px;font-family:sans-serif">
      <h2>Mi Wallet ✅ Sync PRO</h2>
      <p>Online: ${S.online}</p>
      <p>UpdatedAt: ${S.data.updatedAt}</p>
      <button onclick="saveExp()">Agregar gasto</button>
      <pre>${JSON.stringify(S.data,null,2)}</pre>
    </div>
  `;
}

/* =========================
   INIT
========================= */
render();
load().then(()=>{
  if(pollIv)clearInterval(pollIv);
  pollIv=setInterval(poll,4000);
});
</script>
