<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="theme-color" content="#F5F6FA"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Wallet"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Mi Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
  --bg:#F4F0E8;--bg2:#EBE5D8;--white:#FFFEFB;
  --border:#DDD4C0;--border2:#C8BDA8;
  --text:#2A1E14;--text2:#7A6448;--text3:#B0A088;
  --sage:#5A8A70;--sage2:#4A7860;--sage-light:#EAF2EC;--sage-mid:#C0D8C8;
  --salmon:#E8907A;--salmon2:#D07860;--salmon-light:#FAEEEA;
  --burg:#7A2038;--burg-light:#F5E8EC;
  --amber:#C8A040;--amber-light:#F8F0DC;
  --teal:#6AAFA0;--teal-light:#EAF5F2;
  --shadow:0 2px 12px rgba(42,30,20,0.08);
  --shadow-md:0 6px 20px rgba(42,30,20,0.10);
  --shadow-lg:0 10px 36px rgba(42,30,20,0.14);
  --r:18px;--r-sm:14px;--r-xs:10px;
}
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;min-height:100dvh;width:100%;overflow-x:hidden}
    #app{max-width:430px;margin:0 auto;position:relative;min-height:100vh;min-height:100dvh;background:var(--bg);width:100%}

    @keyframes fall{0%{top:-40px;opacity:1}80%{opacity:0.85}100%{top:110%;opacity:0;transform:translateX(var(--drift)) rotate(var(--rot))}}
    .raindrop{position:fixed;top:-40px;animation:fall linear forwards;pointer-events:none;z-index:9998}
    #love-msg.show{opacity:1!important;transform:translateY(0)!important}
    html,body{background:var(--bg)}
    .screen{background:var(--bg)}
    button,input{font-family:'Nunito',sans-serif;cursor:pointer}

    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .screen{min-height:100vh;padding-bottom:90px;overflow-y:auto}
    .tap:active{transform:scale(0.97);transition:transform 0.08s}
    .numkey:active{transform:scale(0.92)!important}

    /* Toast */
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:40px;font-size:13px;font-weight:700;z-index:1000;white-space:nowrap;box-shadow:var(--shadow-lg);animation:fadeIn 0.2s ease}

    /* Sync */
    .sync-row{position:fixed;top:14px;right:16px;display:flex;align-items:center;gap:5px;z-index:100}
    .sync-dot{width:8px;height:8px;border-radius:50%;transition:all 0.4s;background:var(--border2)}
    .spinner{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--sage);animation:spin 0.8s linear infinite}

    /* Bottom nav — Kubayar style */
    .bottom-nav{
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      width:100%;max-width:430px;background:var(--white);
      border-top:1px solid var(--border);
      display:flex;padding:8px 8px 20px;z-index:50;
      box-shadow:0 -2px 12px rgba(0,0,0,0.06);
      gap:4px;
    }
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;border-radius:var(--r-sm);padding:8px 4px;font-size:10px;font-weight:700;color:var(--text3);background:transparent;transition:all 0.15s;letter-spacing:0.2px}
    .nav-btn.active{background:var(--purple-light);color:var(--sage)}
    .nav-icon{font-size:18px;line-height:1.2}

    /* Kubayar balance cards — colorful with circles */
    .kub-card{
      border-radius:20px;padding:22px 20px;position:relative;overflow:hidden;
      box-shadow:var(--shadow-md);flex-shrink:0;
    }
    .kub-card::before{content:"";position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.15)}
    .kub-card::after{content:"";position:absolute;bottom:-40px;right:20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1)}
    .kub-card-blue{background:linear-gradient(135deg,#2979FF 0%,#1E88E5 100%)}
    .kub-card-orange{background:linear-gradient(135deg,#FF9800 0%,#F57C00 100%)}
    .kub-card-purple{background:linear-gradient(135deg,#9C27B0 0%,#7B1FA2 100%)}
    .kub-card-red{background:linear-gradient(135deg,#F44336 0%,#E53935 100%)}
    .kub-card-green{background:linear-gradient(135deg,#00C48C 0%,#009966 100%)}

    /* White card */
    .white-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:20px}

    /* Section title — Kubayar style */
    .section-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}
    .section-sub{font-size:12px;color:var(--text3);margin-bottom:16px}

    /* Labels */
    .kub-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
    .label-dark{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px}

    /* Transaction row */
    .tx-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border)}
    .tx-row:last-child{border-bottom:none}

    /* Icon box — Kubayar colored rectangles */
    .icon-box{width:46px;height:40px;border-radius:var(--r-xs);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

    /* Numpad */
    .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .numkey{background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:17px 0;font-size:22px;font-weight:700;color:var(--text);box-shadow:var(--shadow);width:100%;transition:all 0.1s}

    /* Categories */
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .cat-btn{background:var(--white);border:2px solid var(--border);border-radius:var(--r-sm);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;transition:all 0.15s;box-shadow:var(--shadow)}
    .cat-btn:active{transform:translateY(-2px)}

    /* Steps */
    .step-bar{height:4px;border-radius:2px;transition:all 0.25s}

    /* Inputs */
    .field{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s;font-weight:600}
    .field:focus{border-color:var(--sage);background:var(--white)}
    .field::placeholder{color:var(--text3);font-weight:500}

    /* Buttons */
    .btn-purple{border:none;border-radius:var(--r-sm);padding:16px;font-size:15px;font-weight:800;color:#fff;background:var(--sage);display:flex;align-items:center;justify-content:center;gap:8px;width:100%;box-shadow:0 6px 20px rgba(108,92,231,0.35);transition:all 0.15s}
    .btn-purple:active{transform:scale(0.98)}
    .btn-outline{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:16px;font-size:14px;font-weight:700;color:var(--text2)}
    .btn-sec{flex:1;background:var(--white);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 8px;font-size:11px;font-weight:700;color:var(--text2);display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--shadow);transition:all 0.12s}
    .btn-sec:active{transform:scale(0.97)}
    .btn-sec-icon{font-size:18px}

    /* Back btn */
    .back-btn{width:38px;height:38px;border-radius:var(--r-xs);border:1.5px solid var(--border);background:var(--white);color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}

    /* Check */
    .check{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;transition:all 0.15s}

    /* Auto tag */
    .auto-tag{font-size:9px;background:var(--purple-light);color:var(--sage);padding:2px 8px;border-radius:6px;font-weight:800;letter-spacing:0.3px}

    /* Amount */
    .amt-big{font-size:54px;font-weight:900;letter-spacing:-3px;line-height:1}
    .confirm-amt{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1}

    /* Bar */
    .bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

    /* Pill badge */
    .pill-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:0.3px}

    /* Stat box */
    .stat-box{flex:1;background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 12px;backdrop-filter:blur(4px)}

    /* Kubayar pick avatar */
    .pick-avatar{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0;color:#fff}

    /* Amount input area */
    .amt-area{background:var(--bg);border-radius:var(--r);padding:20px;text-align:center;margin-bottom:20px}

    /* User toggle */
    .user-toggle{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:30px;padding:3px;gap:2px}
    .user-pill{padding:5px 14px;border-radius:28px;border:none;background:transparent;font-size:12px;font-weight:800;color:var(--text3);transition:all 0.18s}
    .user-pill.active{background:var(--white);color:var(--sage);box-shadow:var(--shadow)}
  </style>
</head>
<body>
<div id="app"></div>
<div id="rain-layer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:9999"></div>
<div id="love-msg" style="position:fixed;bottom:100px;left:0;width:100%;text-align:center;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#5A8A70;opacity:0;transform:translateY(10px);transition:all 0.5s ease;pointer-events:none;text-shadow:0 1px 8px rgba(255,255,255,0.95);z-index:10000;padding:0 24px;line-height:1.5"></div>
<script>
const DEFAULT_CATS=[
  {id:"mercaderia",label:"Mercado",icon:"cat-mercado",color:"#5A8A70",bg:"#EAF2EC"},

  {id:"transporte",label:"Transporte",icon:"cat-transporte",color:"#7A6448",bg:"#F0EAE0"},
  {id:"salud",label:"Salud",icon:"cat-salud",color:"#E8907A",bg:"#FAEEEA"},
  {id:"ocio",label:"Ocio",icon:"cat-ocio",color:"#6AAFA0",bg:"#EAF5F2"},
  {id:"ropa",label:"Ropa",icon:"cat-ropa",color:"#7A2038",bg:"#F5E8EC"},

function getCats(){return [...DEFAULT_CATS,...(S.data.customCats||[])];}

const getCat=id=>getCats().find(c=>c.id===id)||CATS[6];
const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

// Proxy URL — sin CORS
const PROXY_URL="/api/sync";
function mkSVG(path,size,color){const s=document.createElementNS("http://www.w3.org/2000/svg","svg");s.setAttribute("width",size);s.setAttribute("height",size);s.setAttribute("viewBox","0 0 24 24");s.setAttribute("fill","none");s.setAttribute("stroke",color||"currentColor");s.setAttribute("stroke-width","1.7");s.setAttribute("stroke-linecap","round");s.setAttribute("stroke-linejoin","round");s.innerHTML=path;return s;}

"cat-mercado":'<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>',
"cat-servicios":'<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>',
"cat-transporte":'<rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>',
"cat-salud":'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
"cat-ocio":'<path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
"cat-ropa":'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>',
"cat-otro":'<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
};const w=document.createElement("div");w.style.cssText=`display:flex;align-items:center;justify-content:center;width:${size}px;height:${size}px;flex-shrink:0`;w.appendChild(mkSVG(icons[name]||icons.plus,size,color));return w;}

async function gsRun(fn,param){
  if(fn==="saveData"){
    const r=await fetch(PROXY_URL,{method:"POST",body:JSON.stringify(param),headers:{"Content-Type":"application/json"}});
    return await r.json();
  } else {
    const r=await fetch(PROXY_URL,{method:"GET"});
    return await r.json();
  }
}

let S={
  screen:"loading",tab:"home",
  activeUser:localStorage.getItem("gf_user")||null,
  data:EMPTY,syncing:false,online:false,toast:null,loginPin:"",loginErr:false,cardColor:null,cardGrad:null,expUser:null,newCat:{name:"",color:"#5A8A70",icon:"cat-otro"},loginPin:"",loginUser:null,loginErr:false,
  amount:"",desc:"",cat:null,step:1,
  incAmt:"",incDesc:"",incStep:1,
};
let pollIv=null,writeT=null,toastT=null,writing=false;

function set(patch){S={...S,...patch};render();}
function showToast(msg){if(toastT)clearTimeout(toastT);set({toast:msg});toastT=setTimeout(()=>set({toast:null}),2500);}

async function load(){
  set({syncing:true});
  try{const d=await gsRun("getData");set({data:d||EMPTY,online:true,syncing:false,screen:"login"});}
  catch{set({online:false,syncing:false,screen:"login"});}
}

function scheduleWrite(data){
  if(writeT)clearTimeout(writeT);
  writing=true;
  writeT=setTimeout(async()=>{
    try{
      await gsRun("saveData",data);
      set({online:true});
    }catch{
      set({online:false});
    }finally{
      writing=false;
    }
  },800);
}

async function poll(){
  // No polling mientras se está escribiendo
  if(writing)return;
  try{
    const d=await gsRun("getData");
    if(d&&!writing){
      S.data=d;
      S.online=true;
      if(S.screen==="main"&&S.tab==="home"){
        updateNums();
      }
      const dot=document.querySelector(".sync-dot");
      if(dot)dot.style.background="var(--sage)";
    }
  }
  catch{
    S.online=false;
    const dot=document.querySelector(".sync-dot");
    if(dot)dot.style.background="var(--border)";
  }
}

function updateNums(){
  const expenses=S.data.expenses||[];
  const incomes=S.data.incomes||[];
  const shBal=incomes.reduce((s,i)=>s+i.amount,0)-expenses.reduce((s,e)=>s+e.amount,0);
  const e=id=>document.getElementById(id);

  // Actualiza cada usuario por separado con sus IDs únicos
  USERS.forEach(u=>{
    const cv=calcUser(u.id);
    if(e(`bal-${u.id}`))e(`bal-${u.id}`).textContent=fmt(cv.bal);
    if(e(`inc-${u.id}`))e(`inc-${u.id}`).textContent=fmt(cv.totI);
    if(e(`exp-${u.id}`))e(`exp-${u.id}`).textContent=fmt(cv.totE);
  });

  // Semana del usuario activo
  const cvActive=calcUser(S.activeUser);
  if(e("n-wk"))e("n-wk").textContent=fmt(cvActive.wkE);
  if(e("n-shared"))e("n-shared").textContent=fmt(shBal);

  const unread=(S.data.shopping||[]).filter(s=>!s.checked).length;
  if(e("shop-badge")){e("shop-badge").textContent=unread;e("shop-badge").style.display=unread>0?"inline-flex":"none";}
}

function upd(fn){const next=fn(S.data);set({data:next});scheduleWrite(next);}

function saveExp(){
  if(!S.amount||!S.cat)return;
  const exp={id:genId(),amount:parseFloat(S.amount),description:S.desc,category:S.cat,user:S.activeUser,date:toStr()};
  upd(d=>({...d,expenses:[exp,...(d.expenses||[])],shopping:(S.cat==="mercaderia"&&S.desc.trim())?[{id:genId(),text:S.desc.trim(),checked:false,from:"expense"},...(d.shopping||[])]:(d.shopping||[])}));
  set({amount:"",desc:"",cat:null,step:1,screen:"main",tab:"home"});
  showToast("✓ Gasto registrado");
}

function saveInc(){
  if(!S.incAmt)return;
  const inc={id:genId(),amount:parseFloat(S.incAmt),description:S.incDesc||"Sueldo",user:S.activeUser,date:toStr()};
  upd(d=>({...d,incomes:[inc,...(d.incomes||[])]}));
  set({incAmt:"",incDesc:"",incStep:1,screen:"main",tab:"home"});
  showToast("✓ Ingreso registrado");
}

function calcUser(uid){
  const expenses=S.data.expenses||[];
  const incomes=S.data.incomes||[];
  const uExp=expenses.filter(e=>e.user===uid);
  const uInc=incomes.filter(i=>i.user===uid);
  const totI=uInc.reduce((s,i)=>s+i.amount,0);
  const totE=uExp.reduce((s,e)=>s+e.amount,0);
  const sw=sowStr();
  const wkE=uExp.filter(e=>e.date>=sw).reduce((s,e)=>s+e.amount,0);
  const dow=new Date().getDay()||7;
  return{totI,totE,bal:totI-totE,wkE,fore:(wkE/dow)*(7-dow),uExp};
}

const h=(tag,attr={},kids=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attr)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="id")el.id=v;
    else el.setAttribute(k,v);
  }
  for(const ch of kids){if(ch==null)continue;el.appendChild(typeof ch==="string"?document.createTextNode(ch):ch);}
  return el;
};

function mkNumpad(onChange,onConfirm,color){
  return h("div",{className:"numpad"},["1","2","3","4","5","6","7","8","9","←","0","✓"].map(k=>{
    const st={};
    if(k==="✓"){st.background=color;st.color="#fff";st.border="none";st.boxShadow=`0 6px 16px ${color}50`;}
    else if(k==="←"){st.background="var(--bg)";st.color="var(--text2)";st.border="none";}
    return h("button",{className:"numkey tap",style:st,onClick:()=>{
      if(k==="⌫")onChange(v=>v.slice(0,-1));
      else if(k==="✓")onConfirm();
      else onChange(v=>v.length<9?v+k:v);
    }},[k]);
  }));
}

function mkSteps(cur,tot,color){
  const row=h("div",{style:{display:"flex",gap:"6px",justifyContent:"center",marginBottom:"24px"}});
  for(let i=0;i<tot;i++)row.appendChild(h("div",{className:"step-bar",style:{width:cur>i?"28px":"8px",background:cur>i?color:"var(--border)"}}));
  return row;
}

function mkSubH(title,onBack,right){
  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"48px 20px 20px"}},[
    h("button",{className:"back-btn tap",onClick:onBack},["←"]),
    h("div",{style:{fontSize:"17px",fontWeight:"800",color:"var(--text)"}},[title]),
    right||h("div",{style:{width:"38px"}}),
  ]);
}

function loveRain(){
  const layer=document.getElementById("rain-layer");
  const msg=document.getElementById("love-msg");
  const msgs=["Los Amo mucho, Papá los ama! 🍂","Sos mi mundo, Flor 💛","Vitto, mi mayor alegría 🌿","Familia, lo más lindo que tengo 🍁","Te amo, Florencia 🫒","Vitto hermoso, papá te ama 🌾","Mi corazón son ustedes dos 🌾"];
  if(msg){msg.textContent=msgs[Math.floor(Math.random()*msgs.length)];msg.classList.add("show");setTimeout(()=>msg.classList.remove("show"),3200);}
  if(!layer)return;layer.innerHTML="";
  const items=["🍂","🍁","🌿","🫒","🌾"];
  for(let i=0;i<44;i++){setTimeout(()=>{const d=document.createElement("div");d.className="raindrop";d.textContent=items[Math.floor(Math.random()*items.length)];const x=Math.random()*(window.innerWidth||400);const dur=1.3+Math.random()*1.8;d.style.left=x+"px";d.style.fontSize=(14+Math.random()*12)+"px";d.style.setProperty("--drift",(Math.random()-0.5)*60+"px");d.style.setProperty("--rot",(Math.random()-0.5)*360+"deg");d.style.animationDuration=dur+"s";layer.appendChild(d);setTimeout(()=>d.remove(),(dur*1000)+100);},i*50);}
}

                h("div",{className:"bar-track"},[h("div",{className:"bar-fill",style:{width:`${(fT/mx)*100}%`,background:USERS[1].color}})]),
              ]),
              h("div",{style:{display:"flex",justifyContent:"space-between"}},[
                h("span",{style:{fontSize:"10px",color:USERS[0].color,fontWeight:"700"}},[`N: ${fmt(nT)}`]),
                h("span",{style:{fontSize:"10px",color:USERS[1].color,fontWeight:"700"}},[`F: ${fmt(fT)}`]),
              ]),
            ]);
          }).filter(Boolean),
          ...(expenses.length===0?[h("div",{style:{fontSize:"14px",color:"var(--text3)",textAlign:"center",padding:"28px 0",fontWeight:"600"}},["Sin datos aún"])]: []),
        ]),
      ]),

      h("div",{style:{display:"flex",flexDirection:"column",gap:"10px",paddingBottom:"20px"}},[
        h("button",{className:"tap",style:{width:"100%",background:"var(--red-light)",border:"1px solid rgba(244,67,54,0.2)",color:"var(--red)",borderRadius:"var(--r-sm)",padding:"14px",fontSize:"13px",fontWeight:"800"},
          onClick:()=>{if(confirm("¿Borrar todos los datos?"))upd(()=>EMPTY);}},["Borrar todos los datos"]),
        h("button",{className:"tap",style:{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",color:"var(--text2)",borderRadius:"var(--r-sm)",padding:"14px",fontSize:"13px",fontWeight:"700"},
          onClick:()=>{localStorage.removeItem("gf_user");set({activeUser:null,loginUser:null,loginPin:"",loginErr:false,screen:"login"});}},["Cambiar usuario"]),
      ]),
    ]),
  ]);
}

// ── Add expense ──
function sAdd(){
  const user=USERS.find(u=>u.id===S.activeUser)||USERS[0];
  const{amount,desc,cat,step,expUser}=S;
  const targetUser=USERS.find(u=>u.id===expUser)||user;
  const pane=h("div",{style:{padding:"0 24px",flex:"1"}});

  if(step===1){
    pane.appendChild(h("div",{style:{marginBottom:"28px",textAlign:"center"}},[
      h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text3)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"18px"}},["¿Cuánto gastaste?"]),
      h("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"center",gap:"6px"}},[
        h("span",{style:{fontSize:"28px",fontWeight:"300",color:"var(--text3)",lineHeight:"1"}},["$"]),
        h("div",{style:{fontSize:"54px",fontWeight:"800",letterSpacing:"-3px",lineHeight:"1",color:amount?targetUser.color:"var(--border2)"}},[amount||"0"]),
      ]),
    ]));
    pane.appendChild(mkNumpad(fn=>set({amount:fn(S.amount)}),()=>S.amount&&set({step:2}),targetUser.color));
  } else if(step===2){
    pane.appendChild(h("div",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text3)",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"18px",textAlign:"center"}},["¿En qué categoría?"]));
    pane.appendChild(h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px"}},[
      ...getCats().map(ct=>{
        const sel=cat===ct.id;
        return h("button",{className:"tap",style:{background:sel?ct.color:ct.bg,border:`1.5px solid ${sel?ct.color:ct.color+"30"}`,borderRadius:"16px",padding:"16px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:"7px",width:"100%",boxShadow:sel?`0 4px 14px ${ct.color}30`:"none",transition:"all 0.15s"},onClick:()=>set({cat:ct.id,step:3})},[
          mkIcon(ct.icon,22,sel?"#fff":ct.color),
          h("span",{style:{fontSize:"11px",fontWeight:"600",color:sel?"#fff":ct.color}},[ct.label]),
        ]);
      }),
      h("button",{className:"tap",style:{background:"var(--white)",border:"1.5px dashed var(--border2)",borderRadius:"16px",padding:"16px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:"7px",width:"100%"},onClick:()=>set({screen:"newcat"})},[
        h("div",{style:{fontSize:"20px",color:"var(--text3)",fontWeight:"300"}},["+"]),
        h("span",{style:{fontSize:"11px",fontWeight:"600",color:"var(--text3)"}},["Nueva"]),
      ]),
    ]));
  } else {
    const ctObj=getCat(cat);
    pane.appendChild(h("div",{style:{textAlign:"center",marginBottom:"20px"}},[
      h("div",{style:{width:"56px",height:"56px",borderRadius:"18px",background:ctObj.bg,border:`1px solid ${ctObj.color}25`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}},[mkIcon(ctObj.icon,26,ctObj.color)]),
      h("div",{style:{fontSize:"38px",fontWeight:"800",color:"var(--text)",letterSpacing:"-2px",lineHeight:"1",marginBottom:"4px"}},[fmt(parseFloat(amount))]),
      h("div",{style:{fontSize:"12px",fontWeight:"600",color:ctObj.color,letterSpacing:"0.5px",textTransform:"uppercase"}},[ctObj.label]),
      h("div",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"4px"}},["→ "+targetUser.name]),
    ]));
    const inp=h("input",{className:"field",placeholder:"Descripción (opcional)",maxlength:"50",style:{textAlign:"center",marginBottom:"16px"}});
    inp.value=desc;inp.addEventListener("input",e=>set({desc:e.target.value}));
    pane.appendChild(inp);
    pane.appendChild(h("div",{style:{display:"flex",gap:"10px"}},[
      h("button",{className:"tap",style:{background:"var(--white)",border:"1px solid var(--border)",borderRadius:"18px",padding:"16px 18px",fontSize:"14px",fontWeight:"600",color:"var(--text2)"},onClick:()=>set({step:2})},["←"]),
      h("button",{className:"tap",style:{flex:"1",border:"none",borderRadius:"18px",padding:"16px",fontSize:"15px",fontWeight:"700",color:"#fff",background:targetUser.grad,boxShadow:`0 6px 18px ${targetUser.color}30`},onClick:()=>{
        if(!amount||!cat)return;
        const exp={id:genId(),amount:parseFloat(amount),description:desc,category:cat,user:expUser||S.activeUser,date:toStr()};
        upd(d=>({...d,expenses:[exp,...(d.expenses||[])],shopping:(cat==="mercaderia"&&desc.trim())?[{id:genId(),text:desc.trim(),checked:false},...(d.shopping||[])]:(d.shopping||[])}));
        set({amount:"",desc:"",cat:null,step:1,expUser:null,screen:"main",tab:"home"});
        showToast("✓ Gasto registrado");
      }},["Guardar"]),
    ]));
  }
  return h("div",{className:"screen",style:{background:"var(--bg)"}},[
    mkSubH("Nuevo Gasto · "+targetUser.name,()=>set({step:1,expUser:null,screen:"main",tab:"home"})),
    mkSteps(step,3,targetUser.color),pane,
  ]);
}

function sIncome(){
  const user=USERS.find(u=>u.id===S.activeUser)||USERS[0];
  const{incAmt,incDesc,incStep}=S;
  const pane=h("div",{style:{padding:"0 20px",flex:"1"}});

  if(incStep===1){
    pane.appendChild(h("div",{style:{fontSize:"15px",fontWeight:"700",color:"var(--text2)",marginBottom:"20px"}},["Ingresá el monto"]));
    pane.appendChild(h("div",{className:"amt-area"},[
      h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--text3)",letterSpacing:"1px",marginBottom:"6px"}},["MONTO EN $ARS"]),
      h("div",{className:"amt-big",style:{color:incAmt?"var(--sage)":"var(--border)"}},[incAmt||"0"]),
    ]));
    pane.appendChild(mkNumpad(fn=>set({incAmt:fn(S.incAmt)}),()=>S.incAmt&&set({incStep:2}),"var(--sage)"));
  } else {
    pane.appendChild(h("div",{style:{fontSize:"15px",fontWeight:"700",color:"var(--text2)",marginBottom:"16px"}},["Confirmá el ingreso"]));
    const card=h("div",{className:"white-card",style:{marginBottom:"16px",textAlign:"center",borderTop:"3px solid var(--sage)"}},[
      h("div",{style:{width:"52px",height:"46px",borderRadius:"14px",background:"var(--sage-light)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 10px"}},[mkIcon("income",24,"var(--sage)")]),
      h("div",{className:"confirm-amt",style:{color:"var(--sage)",marginBottom:"4px"}},[fmt(parseFloat(incAmt))]),
      h("div",{style:{fontSize:"13px",fontWeight:"700",color:"var(--text2)",marginBottom:"16px"}},[`Ingreso · ${user.name}`]),
    ]);
    const inp=h("input",{className:"field",placeholder:"Ej: Sueldo enero",maxlength:"50",style:{textAlign:"center"}});
    inp.value=incDesc;inp.addEventListener("input",e=>set({incDesc:e.target.value}));
    card.appendChild(inp);pane.appendChild(card);
    pane.appendChild(h("div",{style:{display:"flex",gap:"10px"}},[
      h("button",{className:"btn-outline tap",onClick:()=>set({incStep:1})},["← Editar"]),
      h("button",{className:"tap",style:{flex:"1",border:"none",borderRadius:"18px",padding:"16px",fontSize:"15px",fontWeight:"700",color:"#fff",background:"linear-gradient(135deg,var(--sage),var(--sage2))",boxShadow:"0 6px 18px rgba(90,138,112,0.35)"},onClick:saveInc},["Guardar Ingreso"]),
    ]));
  }

  return h("div",{className:"screen"},[
    mkSubH("Nuevo Ingreso",()=>set({incStep:1,screen:"main",tab:"home"})),
    mkSteps(incStep,2,"var(--sage)"),pane,
  ]);
}

// ── Loading ──
function sNewCat(){
  const nc=S.newCat||{name:"",color:"#5A8A70",icon:"cat-otro"};
  const COLORS=["#5A8A70","#E8907A","#C8A040","#6AAFA0","#7A2038","#8B6448","#D07860","#4A7860"];
  const ICONS=["cat-mercado","cat-servicios","cat-transporte","cat-salud","cat-ocio","cat-ropa","cat-otro","income","chart","shopping"];
  return h("div",{className:"screen",style:{background:"var(--bg)"}},[
    mkSubH("Nueva Categoría",()=>set({screen:"add",step:2})),
    h("div",{style:{padding:"0 24px"}},[
      h("div",{style:{display:"flex",alignItems:"center",gap:"14px",background:"var(--white)",borderRadius:"18px",padding:"16px 18px",marginBottom:"24px",border:"1px solid var(--border)",boxShadow:"var(--shadow)"}},[
        h("div",{style:{width:"48px",height:"48px",borderRadius:"14px",background:nc.color,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 12px ${nc.color}40`}},[mkIcon(nc.icon,24,"#fff")]),
        h("div",{},[h("div",{style:{fontSize:"16px",fontWeight:"700",color:"var(--text)"}},[nc.name||"Nombre..."]),h("div",{style:{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}},["Vista previa"])]),
      ]),
      h("div",{style:{marginBottom:"20px"}},[
        h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--text3)",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"8px"}},["Nombre"]),
        (()=>{const inp=h("input",{className:"field",placeholder:"Ej: Mascota, Gym...",maxlength:"20"});inp.value=nc.name;inp.addEventListener("input",e=>set({newCat:{...nc,name:e.target.value}}));return inp;})(),
      ]),
      h("div",{style:{marginBottom:"20px"}},[
        h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--text3)",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"10px"}},["Color"]),
        h("div",{style:{display:"flex",gap:"10px",flexWrap:"wrap"}},[...COLORS.map(col=>h("button",{className:"tap",style:{width:"36px",height:"36px",borderRadius:"50%",background:col,border:"none",boxShadow:nc.color===col?`0 0 0 3px var(--white),0 0 0 5px ${col}`:"none",transition:"all 0.15s"},onClick:()=>set({newCat:{...nc,color:col}})}))]),
      ]),
      h("div",{style:{marginBottom:"28px"}},[
        h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--text3)",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"10px"}},["Ícono"]),
        h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px"}},[...ICONS.map(ic=>h("button",{className:"tap",style:{padding:"12px 0",borderRadius:"14px",background:nc.icon===ic?nc.color+"20":"var(--white)",border:`1.5px solid ${nc.icon===ic?nc.color:"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>set({newCat:{...nc,icon:ic}})},[mkIcon(ic,20,nc.icon===ic?nc.color:"var(--text3)")]))]),
      ]),
      h("button",{className:"tap",style:{width:"100%",border:"none",borderRadius:"18px",padding:"16px",fontSize:"15px",fontWeight:"700",color:"#fff",background:nc.name.trim()?nc.color:"var(--border2)",boxShadow:nc.name.trim()?`0 6px 18px ${nc.color}35`:"none",transition:"all 0.2s"},onClick:()=>{
        if(!nc.name.trim())return;
        const entry={id:"custom-"+genId(),label:nc.name.trim(),icon:nc.icon,color:nc.color,bg:nc.color+"18"};
        const nextData={...S.data,customCats:[...(S.data.customCats||[]),entry]};
        scheduleWrite(nextData);
        set({data:nextData,screen:"add",step:2,cat:entry.id,newCat:{name:"",color:"#5A8A70",icon:"cat-otro"}});
        showToast("✓ Categoría creada");
      }},["Guardar categoría"]),
    ]),
  ]);
}
function sLoading(){
  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:"16px",background:"var(--bg)"}},[
    h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}},[
      h("div",{style:{width:"40px",height:"40px",borderRadius:"13px",background:"var(--sage)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",boxShadow:"0 6px 18px rgba(108,92,231,0.35)"}}),
      h("div",{},[
        h("div",{style:{fontSize:"18px",fontWeight:"900",color:"var(--text)",letterSpacing:"-0.5px"}},["Mi Wallet"]),
        h("div",{style:{fontSize:"11px",color:"var(--text3)",fontWeight:"600"}},["Gastos Familiares"]),
      ]),
    ]),
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},[
      h("div",{className:"spinner"}),
      h("div",{style:{fontSize:"13px",color:"var(--text3)",fontWeight:"600"}},["Conectando..."]),
    ]),
  ]);
}

// ── Render ──
function mkCardCarousel(cards){
  const wrap=document.createElement("div");
  wrap.style.cssText="padding:0 4px";
  cards.forEach((card,i)=>{
    const row=document.createElement("div");
    const isLast=i===cards.length-1;
    row.style.cssText=`display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:${isLast?"none":"1px solid var(--border)"}`;
    const dot=document.createElement("div");
    dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${card.color};flex-shrink:0;box-shadow:0 0 0 3px ${card.color}22`;
    const txt=document.createElement("div");txt.style.cssText="flex:1;min-width:0";
    const name=document.createElement("div");name.style.cssText="font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.2px";name.textContent=card.label;
    const sub=document.createElement("div");sub.style.cssText="font-size:10px;color:var(--text3);margin-top:2px;display:flex;gap:8px";
    const inc=document.createElement("span");inc.style.color="var(--sage)";inc.id=card.stats[0]?.id||"";inc.textContent="↑ "+(card.stats[0]?.val||"$0");
    const exp=document.createElement("span");exp.style.color="var(--burg)";exp.id=card.stats[1]?.id||"";exp.textContent="↓ "+(card.stats[1]?.val||"$0");
    sub.appendChild(inc);sub.appendChild(exp);txt.appendChild(name);txt.appendChild(sub);
    const amt=document.createElement("div");amt.style.cssText="text-align:right;flex-shrink:0";
    const amtVal=document.createElement("div");amtVal.id=card.id;
    amtVal.style.cssText=`font-size:15px;font-weight:700;letter-spacing:-0.3px;color:${card.amount.startsWith("-")?"var(--burg)":"var(--text)"}`;
    amtVal.textContent=card.amount;amt.appendChild(amtVal);
    row.appendChild(dot);row.appendChild(txt);row.appendChild(amt);wrap.appendChild(row);
  });
  return wrap;
}
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  if(S.toast)app.appendChild(h("div",{className:"toast"},[S.toast]));
  app.appendChild(h("div",{className:"sync-row"},[
    ...(S.syncing?[h("div",{className:"spinner"})]: []),
    h("div",{className:"sync-dot",style:{background:S.online?"var(--sage)":"var(--border)"}}),
  ]));
  const screens={loading:sLoading,pick:sPick,login:sLogin,main:sMain,add:sAdd,income:sIncome,newcat:sNewCat};
  app.appendChild((screens[S.screen]||sLoading)());
}

render();
load().then(()=>{if(pollIv)clearInterval(pollIv);pollIv=setInterval(poll,6000);});
</script>
</body>
