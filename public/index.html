<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Wallet</title>

<style>
:root{
  --purple:#5B21B6;
  --purple2:#7C3AED;
  --bg:#F5F5FB;
  --text:#1A1040;
  --gray:#9CA3AF;
}

*{box-sizing:border-box;font-family:Inter,system-ui;margin:0;padding:0}

body{
  background:var(--bg);
  display:flex;
  justify-content:center;
}

#app{
  width:100%;
  max-width:420px;
  min-height:100vh;
  padding-bottom:120px;
}

/* ---------- HOME ---------- */
.header{
  padding:48px 20px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header h1{font-size:22px;color:var(--text)}
.users{
  display:flex;
  gap:8px;
}
.user{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;
}
.N{background:#7C3AED}
.F{background:#A78BFA}
.V{background:#F59E0B}

/* ---------- WALLET CARD ---------- */
.wallet{
  margin:0 20px 24px;
  padding:24px;
  border-radius:26px;
  background:linear-gradient(135deg,#7C3AED,#4C1D95);
  color:#fff;
  position:relative;
  box-shadow:0 14px 40px rgba(0,0,0,.35);
}
.wallet::after{
  content:"";
  position:absolute;
  width:160px;height:160px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  top:-40px;right:-40px;
}
.wallet small{opacity:.7}
.wallet h2{font-size:32px;margin:8px 0}

/* ---------- QUICK ACTIONS ---------- */
.actions{
  margin:0 20px 28px;
  display:flex;
  justify-content:space-between;
}
.act{
  text-align:center;
}
.act button{
  width:52px;height:52px;
  border-radius:50%;
  border:none;
  font-weight:800;
  color:#fff;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
}
.act small{font-size:10px;color:var(--gray)}
.act.N button{background:#7C3AED}
.act.F button{background:#A78BFA}
.act.V button{background:#F59E0B}
.act.W button{background:#fff;color:var(--purple)}

/* ---------- LIST ---------- */
.section{
  padding:0 20px;
}
.section h3{
  font-size:15px;
  color:var(--text);
  margin-bottom:12px;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  color:var(--gray);
}

/* ---------- CHAT ---------- */
.chat{
  position:fixed;
  inset:0;
  background:var(--bg);
  display:none;
  flex-direction:column;
}
.chat header{
  padding:48px 20px 16px;
  background:#fff;
  font-weight:800;
}
.chat .msgs{
  flex:1;
  padding:16px;
  overflow:auto;
}
.msg{
  max-width:80%;
  padding:10px 14px;
  border-radius:16px;
  margin-bottom:8px;
  font-size:14px;
}
.userMsg{
  background:linear-gradient(135deg,#7C3AED,#5B21B6);
  color:#fff;
  margin-left:auto;
}
.botMsg{
  background:#fff;
  border:1px solid #E5E3F0;
}
.chat footer{
  padding:12px;
  display:flex;
  gap:8px;
  background:#fff;
}
.chat textarea{
  flex:1;
  border-radius:20px;
  padding:10px 14px;
  border:1px solid #E5E3F0;
}
.chat button{
  width:42px;height:42px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#7C3AED,#5B21B6);
  color:#fff;
}

/* ---------- BOTTOM NAV ---------- */
.bottom{
  position:fixed;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:calc(100% - 32px);
  max-width:390px;
  height:72px;
  background:linear-gradient(180deg,#1C1346,#120A33);
  border-radius:28px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:0 12px 40px rgba(0,0,0,.45);
}
.bottom button{
  background:none;border:none;
  color:rgba(255,255,255,.6);
  font-size:10px;
}
.center{
  width:56px;height:56px;
  border-radius:50%;
  background:linear-gradient(135deg,#8B5CF6,#5B21B6);
  margin-top:-24px;
  color:#fff;
  font-size:18px;
  box-shadow:0 8px 24px rgba(139,92,246,.6);
}
</style>
</head>

<body>
<div id="app">

  <!-- HOME -->
  <div id="home">
    <div class="header">
      <h1>Bienvenido<br><strong>Nahuel</strong></h1>
      <div class="users">
        <div class="user N">N</div>
        <div class="user F">F</div>
        <div class="user V">V</div>
      </div>
    </div>

    <div class="wallet">
      <small>BALANCE TOTAL</small>
      <h2 id="balance">$0</h2>
      <small>Nahuel · Florencia · Vitto</small>
    </div>

    <div class="actions">
      <div class="act N"><button onclick="openChat()">N</button><small>Nahuel</small></div>
      <div class="act F"><button onclick="openChat()">F</button><small>Flor</small></div>
      <div class="act V"><button onclick="openChat()">V</button><small>Vitto</small></div>
      <div class="act W"><button onclick="openChat()">↑</button><small>Ingreso</small></div>
      <div class="act W"><button onclick="openChat()">≡</button><small>Lista</small></div>
      <div class="act W"><button onclick="openChat()">IA</button><small>IA</small></div>
    </div>

    <div class="section">
      <h3>Últimos gastos</h3>
      <div class="card" id="empty">Sin gastos registrados</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <header>
      <button onclick="closeChat()">←</button> Registro con IA
    </header>
    <div class="msgs" id="msgs"></div>
    <footer>
      <textarea id="input" placeholder="Ej: pizza 1500 o uber 5k"></textarea>
      <button onclick="send()">→</button>
    </footer>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom">
    <button>Inicio</button>
    <button>Mov</button>
    <button class="center" onclick="openChat()">IA</button>
    <button>Lista</button>
    <button>Stats</button>
  </div>

</div>

<script>
let expenses=[]

function openChat(){
  document.getElementById("chat").style.display="flex"
}
function closeChat(){
  document.getElementById("chat").style.display="none"
}

function parse(text){
  const parts=text.toLowerCase().split(/ y |,|;/)
  const txs=[]
  parts.forEach(p=>{
    let amt=0
    if(/(\d+)\s?(k|mil)/.test(p)) amt=parseInt(RegExp.$1)*1000
    else{
      const m=p.match(/\d+/)
      if(m) amt=parseInt(m[0])
    }
    if(!amt) return
    txs.push({amount:amt})
  })
  return txs
}

function send(){
  const input=document.getElementById("input")
  const text=input.value.trim()
  if(!text)return

  addMsg(text,"userMsg")

  // corrección
  if(/^no/.test(text)){
    const tx=parse(text)[0]
    if(tx && expenses.length){
      expenses[0].amount=tx.amount
      update()
      addMsg("✓ Gasto corregido","botMsg")
      input.value=""
      return
    }
  }

  const txs=parse(text)
  txs.forEach(t=>expenses.unshift(t))
  update()

  addMsg("✓ Registrado","botMsg")
  input.value=""
}

function addMsg(text,cls){
  const m=document.createElement("div")
  m.className="msg "+cls
  m.textContent=text
  document.getElementById("msgs").appendChild(m)
  m.scrollIntoView()
}

function update(){
  document.getElementById("empty").style.display="none"
  const total=expenses.reduce((s,e)=>s+e.amount,0)
  document.getElementById("balance").textContent="$"+total
}
</script>
</body>
</html>
